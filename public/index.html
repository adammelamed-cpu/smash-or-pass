<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>SkiBrief</title>
<meta name="theme-color" content="#0a0e14" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="SkiBrief" />
<link rel="manifest" href="/manifest.json" />
<link rel="apple-touch-icon" href="/icon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet" />
<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { min-height: 100vh; background: #0a0e14; }
  body { font-family: 'Barlow', sans-serif; color: #e8edf2; }

  .ski-root {
    background: #0a0e14; min-height: 100vh; width: 100%; max-width: 960px; margin: 0 auto;
    padding-bottom: calc(64px + env(safe-area-inset-bottom, 0px));
  }

  /* ── HERO ─────────────────────────────── */
  .hero { position: relative; height: 280px; overflow: hidden; display: flex; align-items: flex-end; }
  .hero-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; filter: brightness(0.42) saturate(1.15); transition: opacity 0.9s ease; }
  .hero-overlay { position: absolute; inset: 0; background: linear-gradient(to top, #0a0e14 0%, rgba(10,14,20,0.3) 60%, transparent 100%); }
  .hero-content { position: relative; padding: 0 28px 26px; width: 100%; }
  .hero-eyebrow { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; color: #00BFFF; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .hero-os-badge { display: inline-flex; align-items: center; gap: 4px; background: rgba(0,191,255,0.15); border: 1px solid rgba(0,191,255,0.3); border-radius: 3px; padding: 2px 7px; font-size: 9px; font-weight: 700; letter-spacing: 0.12em; color: #00BFFF; text-decoration: none; }
  .hero-title { font-family: 'Barlow Condensed', sans-serif; font-size: 48px; font-weight: 800; line-height: 0.95; text-transform: uppercase; color: #fff; margin: 0 0 6px; }
  .hero-sub { font-size: 13px; font-weight: 300; color: rgba(255,255,255,0.55); }

  /* ── CONTROLS ─────────────────────────── */
  .controls { background: #111620; border-bottom: 1px solid rgba(255,255,255,0.07); padding: 16px 28px; display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
  .field-group { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 140px; }
  .field-label { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; color: rgba(255,255,255,0.38); }
  .field-input { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 4px; color: #e8edf2; font-family: 'Barlow', sans-serif; font-size: 13px; padding: 9px 12px; outline: none; width: 100%; transition: border-color 0.2s; }
  .field-input:focus { border-color: #00BFFF; }
  .field-input::placeholder { color: rgba(255,255,255,0.22); }
  .field-input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.6); cursor: pointer; }
  .resort-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(0,191,255,0.12); border: 1px solid rgba(0,191,255,0.35); border-radius: 4px; padding: 8px 12px; font-size: 13px; color: #00BFFF; font-weight: 500; cursor: default; }
  .resort-badge-state { opacity: 0.5; font-size: 11px; }
  .resort-badge-remove { background: none; border: none; cursor: pointer; color: rgba(0,191,255,0.55); font-size: 17px; line-height: 1; padding: 0; margin-left: 2px; }
  .dropdown-wrap { position: relative; }
  .dropdown { position: absolute; top: calc(100% + 5px); left: 0; right: 0; z-index: 300; background: #1a2030; border: 1px solid rgba(255,255,255,0.13); border-radius: 6px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.7); }
  .dropdown-item { padding: 11px 14px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; color: #c8d4e0; transition: background 0.1s; }
  .dropdown-item:last-child { border-bottom: none; }
  .dropdown-item:hover { background: rgba(0,191,255,0.09); }
  .dropdown-tags { display: flex; gap: 5px; align-items: center; }
  .tag { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 3px; letter-spacing: 0.06em; }
  .tag-os { background: rgba(0,191,255,0.14); color: #00BFFF; border: 1px solid rgba(0,191,255,0.28); }
  .tag-ua { background: rgba(168,255,120,0.12); color: #A8FF78; border: 1px solid rgba(168,255,120,0.28); }
  .tag-st { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.42); border: 1px solid rgba(255,255,255,0.1); }
  .dropdown-empty { padding: 13px 14px; color: rgba(255,255,255,0.28); font-size: 13px; }
  .cta-btn { background: #00BFFF; border: none; border-radius: 4px; color: #0a0e14; font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 0.09em; text-transform: uppercase; padding: 11px 24px; cursor: pointer; display: flex; align-items: center; gap: 7px; white-space: nowrap; transition: background 0.18s, opacity 0.18s; align-self: flex-end; }
  .cta-btn:hover:not(:disabled) { background: #33CCFF; }
  .cta-btn:disabled { opacity: 0.38; cursor: not-allowed; }

  /* ── OPENSNOW + TRAFFIC ───────────────── */
  .opensnow-panel { background: linear-gradient(to right, rgba(0,65,115,0.45), rgba(0,191,255,0.05)); border-bottom: 1px solid rgba(0,191,255,0.18); padding: 10px 28px; display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .os-badge { display: flex; align-items: center; gap: 5px; background: rgba(0,191,255,0.14); border: 1px solid rgba(0,191,255,0.35); border-radius: 4px; padding: 4px 9px; font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: #00BFFF; flex-shrink: 0; }
  .os-links { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; flex: 1; }
  .os-link { font-size: 12px; color: rgba(160,220,255,0.75); text-decoration: none; transition: color 0.15s; }
  .os-link:hover { color: #00BFFF; }
  .os-divider { color: rgba(255,255,255,0.15); font-size: 11px; }
  .os-powered { font-size: 10px; color: rgba(255,255,255,0.18); margin-left: auto; white-space: nowrap; font-style: italic; }
  .traffic-panel { background: rgba(255,107,53,0.04); border-bottom: 1px solid rgba(255,107,53,0.1); padding: 8px 28px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .traffic-header { display: flex; align-items: center; gap: 5px; font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,107,53,0.7); flex-shrink: 0; }
  .traffic-chips { display: flex; gap: 5px; flex-wrap: wrap; }
  .traffic-chip { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; color: rgba(255,130,70,0.8); border: 1px solid rgba(255,107,53,0.22); border-radius: 3px; padding: 4px 9px; text-decoration: none; background: none; transition: all 0.15s; font-family: 'Barlow', sans-serif; white-space: nowrap; }
  .traffic-chip:hover { background: rgba(255,107,53,0.1); color: #FF8040; }
  .traffic-chip-nav { color: rgba(100,210,100,0.8); border-color: rgba(100,200,100,0.2); }
  .traffic-chip-nav:hover { background: rgba(100,200,100,0.1); color: #A8FF78; }

  /* ── QUICK LINKS ──────────────────────── */
  .quick-links { padding: 10px 28px; display: flex; gap: 8px; flex-wrap: wrap; border-bottom: 1px solid rgba(255,255,255,0.05); background: #0d1118; }
  .ql-btn { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 500; font-family: 'Barlow', sans-serif; padding: 5px 11px; border-radius: 3px; border: 1px solid; text-decoration: none; letter-spacing: 0.04em; transition: opacity 0.15s; cursor: pointer; background: none; }
  .ql-btn:hover { opacity: 0.72; }
  .ql-cyan   { color: #00BFFF; border-color: rgba(0,191,255,0.3); }
  .ql-green  { color: #A8FF78; border-color: rgba(168,255,120,0.3); }
  .ql-amber  { color: #FFD700; border-color: rgba(255,215,0,0.3); }
  .ql-orange { color: #FF6B35; border-color: rgba(255,107,53,0.3); }

  /* ── BRIEFING CARDS ───────────────────── */
  .cards { padding: 18px 28px 24px; display: flex; flex-direction: column; gap: 2px; }
  .section-card { background: #111620; border-bottom: 1px solid rgba(255,255,255,0.05); overflow: hidden; }
  .section-card:first-child { border-radius: 8px 8px 0 0; }
  .section-card:last-child  { border-radius: 0 0 8px 8px; border-bottom: none; }
  .card-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px 0; gap: 10px; flex-wrap: wrap; }
  .card-label-group { display: flex; align-items: center; gap: 9px; }
  .card-icon { width: 28px; height: 28px; border-radius: 4px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .card-title { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 0.11em; text-transform: uppercase; }
  .card-links { display: flex; gap: 6px; flex-wrap: wrap; }
  .card-body { padding: 11px 18px 17px; font-size: 13px; line-height: 1.8; color: rgba(220,232,242,0.82); white-space: pre-wrap; }
  .card-body-empty { color: rgba(255,255,255,0.18); font-style: italic; }
  .pulse-row { display: flex; gap: 5px; align-items: center; padding: 13px 18px 17px; }
  .pulse-dot { width: 5px; height: 5px; border-radius: 50%; animation: pulse-anim 1.1s ease-in-out infinite; }
  .pulse-dot:nth-child(2) { animation-delay: 0.16s; }
  .pulse-dot:nth-child(3) { animation-delay: 0.32s; }
  @keyframes pulse-anim { 0%,100%{opacity:.12} 50%{opacity:1} }
  .pulse-label { font-size: 12px; color: rgba(255,255,255,0.28); margin-left: 5px; }
  .error-bar { margin: 14px 28px 0; background: rgba(255,80,80,0.1); border: 1px solid rgba(255,80,80,0.3); border-radius: 6px; padding: 11px 15px; font-size: 13px; color: #ff9090; display: flex; align-items: center; gap: 8px; }
  .empty { padding: 48px 28px; text-align: center; }
  .empty-icon { font-size: 44px; color: rgba(255,255,255,0.09); display: block; margin-bottom: 14px; }
  .empty-text { font-size: 13px; color: rgba(255,255,255,0.28); line-height: 1.8; }
  .result-pill { display: inline-flex; align-items: center; gap: 6px; background: rgba(168,255,120,0.1); border: 1px solid rgba(168,255,120,0.25); border-radius: 20px; padding: 5px 14px; font-size: 11px; color: #A8FF78; font-family: 'Barlow Condensed', sans-serif; letter-spacing: 0.09em; text-transform: uppercase; }
  .tahoe-notice { margin: 12px 28px 0; background: rgba(255,107,53,0.08); border: 1px solid rgba(255,107,53,0.25); border-radius: 6px; padding: 11px 15px; font-size: 12px; color: rgba(255,180,130,0.9); display: flex; gap: 9px; align-items: flex-start; line-height: 1.6; }
  .tahoe-notice a { color: #FF9A6C; text-decoration: none; font-weight: 600; }

  /* ── ADDRESS AUTOCOMPLETE ─────────────── */
  .addr-wrap { position: relative; width: 100%; }
  .addr-dropdown { position: absolute; top: calc(100% + 5px); left: 0; right: 0; z-index: 400; background: #1a2030; border: 1px solid rgba(255,255,255,0.13); border-radius: 6px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.7); }
  .addr-item { padding: 10px 13px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: flex-start; gap: 9px; transition: background 0.1s; }
  .addr-item:last-child { border-bottom: none; }
  .addr-item:hover, .addr-item.highlighted { background: rgba(0,191,255,0.09); }
  .addr-item-icon { color: rgba(0,191,255,0.5); font-size: 13px; margin-top: 1px; flex-shrink: 0; }
  .addr-item-main { font-size: 13px; color: #c8d4e0; line-height: 1.3; }
  .addr-item-sub  { font-size: 11px; color: rgba(255,255,255,0.32); margin-top: 1px; }
  .addr-spinner   { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 13px; color: rgba(0,191,255,0.5); }
  .addr-confirmed { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 13px; color: #A8FF78; }

  /* ── BOTTOM NAV ───────────────────────── */
  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000; background: rgba(13,18,28,0.97); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); border-top: 1px solid rgba(255,255,255,0.09); display: flex; justify-content: center; padding-bottom: env(safe-area-inset-bottom, 0px); }
  .bottom-nav-inner { display: flex; width: 100%; max-width: 960px; }
  .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 10px 0 9px; font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.32); cursor: pointer; border: none; background: none; transition: color 0.15s; }
  .nav-item i { font-size: 22px; line-height: 1; }
  .nav-item.active { color: #00BFFF; }

  /* ── ONBOARDING ───────────────────────── */
  .onboard-root { min-height: 100vh; display: flex; flex-direction: column; }
  .onboard-hero { position: relative; height: 240px; overflow: hidden; flex-shrink: 0; }
  .onboard-hero-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; filter: brightness(0.35) saturate(1.2); }
  .onboard-hero-overlay { position: absolute; inset: 0; background: linear-gradient(to top, #0a0e14 0%, transparent 60%); }
  .onboard-hero-content { position: absolute; bottom: 0; left: 0; right: 0; padding: 0 28px 28px; }
  .onboard-eyebrow { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; color: #00BFFF; margin-bottom: 6px; }
  .onboard-title { font-family: 'Barlow Condensed', sans-serif; font-size: 44px; font-weight: 800; text-transform: uppercase; color: #fff; line-height: 1; }
  .onboard-body { flex: 1; padding: 28px 28px 20px; display: flex; flex-direction: column; }
  .onboard-step-label { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: rgba(255,255,255,0.28); margin-bottom: 6px; }
  .onboard-step-title { font-family: 'Barlow Condensed', sans-serif; font-size: 26px; font-weight: 800; text-transform: uppercase; color: #fff; margin-bottom: 6px; }
  .onboard-step-sub { font-size: 13px; color: rgba(255,255,255,0.4); margin-bottom: 24px; line-height: 1.6; }
  .onboard-fields { display: flex; flex-direction: column; gap: 12px; flex: 1; }
  .onboard-actions { display: flex; gap: 10px; margin-top: 28px; padding-bottom: env(safe-area-inset-bottom, 16px); }
  .onboard-btn-primary { flex: 1; background: #00BFFF; border: none; border-radius: 8px; color: #0a0e14; font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 14px 20px; cursor: pointer; transition: background 0.18s; display: flex; align-items: center; justify-content: center; gap: 7px; }
  .onboard-btn-primary:hover:not(:disabled) { background: #33CCFF; }
  .onboard-btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }
  .onboard-btn-skip { background: none; border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; color: rgba(255,255,255,0.4); font-family: 'Barlow', sans-serif; font-size: 13px; padding: 14px 18px; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .onboard-btn-skip:hover { border-color: rgba(255,255,255,0.25); color: rgba(255,255,255,0.6); }
  .step-dots { display: flex; gap: 7px; margin-bottom: 20px; }
  .step-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.15); transition: background 0.2s; }
  .step-dot.active { background: #00BFFF; }
  .step-dot.done { background: rgba(0,191,255,0.4); }
  .phone-hint { font-size: 11px; color: rgba(255,255,255,0.28); margin-top: 5px; }
  .section-prefs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .pref-toggle { display: flex; align-items: center; gap: 9px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.09); border-radius: 6px; padding: 10px 12px; cursor: pointer; transition: all 0.15s; }
  .pref-toggle.on { background: rgba(0,191,255,0.1); border-color: rgba(0,191,255,0.3); }
  .pref-check { width: 18px; height: 18px; border-radius: 4px; border: 1.5px solid rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; font-size: 10px; font-weight: 700; }
  .pref-toggle.on .pref-check { background: #00BFFF; border-color: #00BFFF; color: #0a0e14; }
  .pref-label { font-size: 12px; color: rgba(255,255,255,0.6); font-weight: 500; line-height: 1.3; }
  .pref-toggle.on .pref-label { color: #e8edf2; }
  .crew-options { display: flex; flex-direction: column; gap: 8px; }
  .crew-option-btn { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 14px 16px; cursor: pointer; text-align: left; transition: all 0.15s; }
  .crew-option-btn:hover { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.2); }
  .crew-option-btn.selected { background: rgba(0,191,255,0.1); border-color: rgba(0,191,255,0.35); }
  .crew-option-title { font-size: 14px; font-weight: 600; color: #e8edf2; margin-bottom: 3px; }
  .crew-option-sub { font-size: 12px; color: rgba(255,255,255,0.38); }
  .crew-code-input { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase; text-align: center; }

  /* ── CREW TAB ─────────────────────────── */
  .crew-root { padding: 0; }
  .crew-page-header { padding: 24px 28px 18px; border-bottom: 1px solid rgba(255,255,255,0.07); }
  .crew-page-eyebrow { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(255,255,255,0.3); margin-bottom: 5px; }
  .crew-page-title { font-family: 'Barlow Condensed', sans-serif; font-size: 32px; font-weight: 800; text-transform: uppercase; color: #fff; }
  .crew-section { padding: 18px 28px; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .crew-section-label { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(255,255,255,0.3); margin-bottom: 12px; }
  .crew-member-list { display: flex; flex-direction: column; gap: 2px; }
  .crew-member-row { display: flex; align-items: center; gap: 12px; padding: 10px 14px; background: #111620; border-radius: 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
  .crew-member-row:first-child { border-radius: 8px 8px 0 0; }
  .crew-member-row:last-child  { border-radius: 0 0 8px 8px; border-bottom: none; }
  .crew-member-emoji { font-size: 20px; width: 28px; text-align: center; flex-shrink: 0; }
  .crew-member-info { flex: 1; min-width: 0; }
  .crew-member-name { font-size: 13px; font-weight: 500; color: #e8edf2; display: flex; align-items: center; gap: 6px; }
  .crew-member-activity { font-size: 11px; color: rgba(255,255,255,0.38); margin-top: 1px; }
  .crew-member-time { font-size: 10px; color: rgba(255,255,255,0.2); flex-shrink: 0; }
  .you-badge { font-size: 9px; color: #00BFFF; background: rgba(0,191,255,0.12); border-radius: 3px; padding: 1px 5px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; }
  .pending-dot { color: rgba(255,255,255,0.2); font-style: italic; }
  .activity-skiing { color: #00BFFF; }
  .activity-lake   { color: #38BDF8; }
  .activity-golf   { color: #A8FF78; }
  .activity-home   { color: #94A3B8; }

  /* Check-in button */
  .checkin-btn { width: 100%; background: rgba(168,255,120,0.1); border: 1px solid rgba(168,255,120,0.28); border-radius: 8px; padding: 14px 20px; display: flex; align-items: center; justify-content: center; gap: 9px; font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #A8FF78; cursor: pointer; transition: all 0.18s; }
  .checkin-btn:hover:not(:disabled) { background: rgba(168,255,120,0.18); }
  .checkin-btn:disabled { opacity: 0.38; cursor: not-allowed; }
  .invite-row { display: flex; align-items: center; gap: 10px; padding: 12px 14px; background: #111620; border-radius: 8px; border: 1px solid rgba(255,255,255,0.07); }
  .invite-code { font-family: 'Barlow Condensed', sans-serif; font-size: 24px; font-weight: 800; letter-spacing: 0.22em; color: #fff; flex: 1; }

   HELPERS

function parseSection(text, key) {
  const keys = SECTION_MARKERS[key];
  const otherKeys = Object.entries(SECTION_MARKERS).filter(([k]) => k !== key).flatMap(([,v]) => v);
  const lines = text.split("\n");
  let capturing = false, result = [];
  for (const line of lines) {
    const upper = line.trim().toUpperCase();
    if (!capturing && keys.some(k => upper.startsWith(k))) {
      capturing = true;
      const after = line.slice(line.indexOf(":") + 1).trim();
      if (after) result.push(after);
      continue;
    }
    if (capturing) {
      if (otherKeys.some(k => upper.startsWith(k))) break;
      result.push(line);
    }
  }
  return result.join("\n").trim();
}

/* ════════════════════════════════════════════════════════
   ADDRESS AUTOCOMPLETE
════════════════════════════════════════════════════════ */
function AddressAutocomplete({ value, onChange, placeholder }) {
  const [inputVal, setInputVal]       = useState(value || "");
  const [suggestions, setSuggestions] = useState([]);
  const [showDrop, setShowDrop]       = useState(false);
  const [loading, setLoading]         = useState(false);
  const [confirmed, setConfirmed]     = useState(!!value);
  const [highlighted, setHighlighted] = useState(-1);
  const debounceRef = useRef(null);
  const abortRef    = useRef(null);

  useEffect(() => { setInputVal(value || ""); }, [value]);

  function buildLabel(r) {
    const a = r.address || {}, p = [];
    const hn = a.house_number || "", road = a.road || a.pedestrian || a.footway || "";
    if (road) p.push(hn ? `${hn} ${road}` : road);
    const city = a.city || a.town || a.village || a.hamlet || "";
    if (city) p.push(city);
    const state = a.state || a.province || "", zip = a.postcode || "";
    if (state && zip) p.push(`${state} ${zip}`); else if (state) p.push(state);
    const cc = a.country_code ? a.country_code.toUpperCase() : "";
    if (cc && cc !== "US") p.push(a.country || cc);
    return p.length > 0 ? p.join(", ") : r.display_name;
  }
  function buildMain(r) {
    const a = r.address || {}, hn = a.house_number || "", road = a.road || a.pedestrian || a.footway || "";
    if (road) return hn ? `${hn} ${road}` : road;
    return a.city || a.town || a.village || a.hamlet || r.display_name.split(",")[0];
  }
  function buildSub(r) {
    const a = r.address || {}, city = a.city || a.town || a.village || "", state = a.state || "", zip = a.postcode || "";
    const road = a.road || "", cc = a.country_code ? a.country_code.toUpperCase() : "";
    const p = [];
    if (road && city) p.push(city);
    if (state) p.push(zip ? `${state} ${zip}` : state);
    if (cc && cc !== "US") p.push(a.country || cc);
    return p.join(", ");
  }

  function handleInput(e) {
    const v = e.target.value;
    setInputVal(v); setConfirmed(false); setHighlighted(-1); onChange(v);
    clearTimeout(debounceRef.current);
    if (v.trim().length < 3) { setSuggestions([]); setShowDrop(false); return; }
    debounceRef.current = setTimeout(async () => {
      if (abortRef.current) abortRef.current.abort();
      abortRef.current = new AbortController();
      setLoading(true);
      try {
        const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(v)}&format=json&addressdetails=1&limit=7&countrycodes=us,ca,jp`;
        const res = await fetch(url, { signal: abortRef.current.signal, headers: { "Accept-Language": "en", "User-Agent": "SkiBriefApp/2.0" } });
        const data = await res.json();
        const seen = new Set(), mapped = [];
        for (const r of data) {
          const label = buildLabel(r);
          if (!seen.has(label)) { seen.add(label); mapped.push({ label, main: buildMain(r), sub: buildSub(r) }); }
        }
        setSuggestions(mapped); setShowDrop(true);
      } catch (err) { if (err.name !== "AbortError") setSuggestions([]); }
      finally { setLoading(false); }
    }, 300);
  }

  function pick(s) { setInputVal(s.label); setConfirmed(true); setSuggestions([]); setShowDrop(false); onChange(s.label); }

  function handleKeyDown(e) {
    if (!showDrop || !suggestions.length) return;
    if (e.key === "ArrowDown") { e.preventDefault(); setHighlighted(h => Math.min(h+1, suggestions.length-1)); }
    if (e.key === "ArrowUp")   { e.preventDefault(); setHighlighted(h => Math.max(h-1, 0)); }
    if (e.key === "Enter" && highlighted >= 0) { e.preventDefault(); pick(suggestions[highlighted]); }
    if (e.key === "Escape") { setShowDrop(false); setHighlighted(-1); }
  }

  return (
    <div className="addr-wrap">
      <input className="field-input" type="text" value={inputVal} onChange={handleInput} onKeyDown={handleKeyDown}
        onFocus={() => suggestions.length > 0 && setShowDrop(true)}
        onBlur={() => setTimeout(() => setShowDrop(false), 180)}
        placeholder={placeholder} autoComplete="off" style={{ paddingRight: 30 }} />
      {loading   && <i className="ti ti-loader-2 spin addr-spinner" />}
      {confirmed && !loading && <i className="ti ti-check addr-confirmed" />}
      {showDrop && suggestions.length > 0 && (
        <div className="addr-dropdown">
          {suggestions.map((s, i) => (
            <div key={i} className={`addr-item${highlighted===i?" highlighted":""}`}
              onMouseDown={() => pick(s)} onMouseEnter={() => setHighlighted(i)}>
              <i className="ti ti-map-pin addr-item-icon" />
              <div><div className="addr-item-main">{s.main}</div>{s.sub && <div className="addr-item-sub">{s.sub}</div>}</div>
            </div>
          ))}
          <div style={{padding:"6px 13px 7px",fontSize:10,color:"rgba(255,255,255,0.18)",textAlign:"right"}}>© OpenStreetMap</div>
        </div>
      )}
    </div>
  );
}

/* ════════════════════════════════════════════════════════
   RESORT PICKER (shared by onboarding + briefing tab)
════════════════════════════════════════════════════════ */
function ResortPicker({ value, onChange }) {
  const [query, setQuery]     = useState(value || "");
  const [showDrop, setShowDrop] = useState(false);
  const selected = IKON_RESORTS.find(r => r.name === value) || null;

  const filtered = useMemo(() => {
    if (!query.trim()) return IKON_RESORTS.slice(0, 8);
    const q = query.toLowerCase();
    return IKON_RESORTS.filter(r => r.name.toLowerCase().includes(q) || r.state.toLowerCase().includes(q)).slice(0, 8);
  }, [query]);

  if (selected) return (
    <div className="resort-badge">
      <i className="ti ti-map-pin" style={{fontSize:12}} />
      {selected.name}
      <span className="resort-badge-state">{selected.state}</span>
      <button className="resort-badge-remove" onClick={() => { onChange(null); setQuery(""); }}>×</button>
    </div>
  );

  return (
    <div className="dropdown-wrap">
      <input className="field-input" type="text" placeholder="Search resorts…" value={query}
        onChange={e => { setQuery(e.target.value); setShowDrop(true); }}
        onFocus={() => setShowDrop(true)}
        onBlur={() => setTimeout(() => setShowDrop(false), 160)} />
      {showDrop && filtered.length > 0 && (
        <div className="dropdown">
          {filtered.map(r => (
            <div key={r.name} className="dropdown-item" onMouseDown={() => { onChange(r.name); setQuery(""); setShowDrop(false); }}>
              <span>{r.name}</span>
              <div className="dropdown-tags">
                {r.unofficialAlpine && <span className="tag tag-ua">UA</span>}
                {r.opensnow && <span className="tag tag-os">OS</span>}
                <span className="tag tag-st">{r.state}</span>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ════════════════════════════════════════════════════════
   ONBOARDING
════════════════════════════════════════════════════════ */
function Onboarding({ onComplete }) {
  const [step, setStep]     = useState(0);
  const [name, setName]     = useState('');
  const [phone, setPhone]   = useState('');
  const [mountain, setMountain] = useState(null);
  const [city, setCity]     = useState('');
  const [sections, setSections] = useState(new Set(ALL_SECTIONS));
  const [crewMode, setCrewMode] = useState(null); // 'create' | 'join' | null
  const [crewName, setCrewName] = useState('');
  const [crewCode, setCrewCode] = useState('');
  const [saving, setSaving] = useState(false);

  const toggleSection = (s) => setSections(prev => {
    const next = new Set(prev);
    if (next.has(s)) next.delete(s); else next.add(s);
    return next;
  });

  async function finish() {
    setSaving(true);
    const profile = {
      name: name.trim(),
      phone: phone.replace(/\D/g, '').slice(-10),
      home_mountain: mountain,
      departure_city: city,
      section_prefs: [...sections],
    };

    // Save to localStorage immediately
    const localProfile = { ...profile, id: null, crew: null };
    saveProfile(localProfile);

    // Try to sync with server
    try {
      const r = await fetch('/api/profile', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(profile),
      });
      if (r.ok) {
        const data = await r.json();
        localProfile.id = data.id;

        // Create or join crew
        if (crewMode === 'create' && crewName.trim() && data.id) {
          const cr = await fetch('/api/crew', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: crewName.trim(), profile_id: data.id }),
          });
          if (cr.ok) { const crew = await cr.json(); localProfile.crew = crew; }
        } else if (crewMode === 'join' && crewCode.trim() && data.id) {
          const jr = await fetch('/api/crew', {
            method: 'PATCH', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ invite_code: crewCode.trim(), profile_id: data.id }),
          });
          if (jr.ok) { const crew = await jr.json(); localProfile.crew = crew; }
        }
        saveProfile(localProfile);
      }
    } catch {}

    setSaving(false);
    onComplete(localProfile);
  }

  const steps = [
    { label: 'Step 1 of 4', title: 'Your details', sub: 'So your crew knows who you are, and we can send you check-ins.' },
    { label: 'Step 2 of 4', title: 'Home mountain', sub: 'We\'ll pre-load your briefing every time you open the app.' },
    { label: 'Step 3 of 4', title: 'Your briefing', sub: 'Choose what you want to see. You can change this anytime.' },
    { label: 'Step 4 of 4', title: 'Your crew',     sub: 'Connect with friends to share daily check-ins. Skip to do this later.' },
  ];

  const heroImg = mountain ? (IKON_RESORTS.find(r => r.name === mountain)?.img || IKON_RESORTS[0].img) : IKON_RESORTS[0].img;

  return (
    <div className="onboard-root">
      <div className="onboard-hero">
        <img className="onboard-hero-img" src={heroImg} alt="" />
        <div className="onboard-hero-overlay" />
        <div className="onboard-hero-content">
          <div className="onboard-eyebrow">SkiBrief · Ikon Pass</div>
          <div className="onboard-title">{step === 0 ? "Let's set\nyou up" : (mountain || "Your ski app")}</div>
        </div>
      </div>

      <div className="onboard-body">
        <div className="step-dots">
          {[0,1,2,3].map(i => (
            <div key={i} className={`step-dot${i===step?' active':i<step?' done':''}`} />
          ))}
        </div>
        <div className="onboard-step-label">{steps[step].label}</div>
        <div className="onboard-step-title">{steps[step].title}</div>
        <div className="onboard-step-sub">{steps[step].sub}</div>

        <div className="onboard-fields">
          {step === 0 && (
            <>
              <div className="field-group">
                <span className="field-label">Your name</span>
                <input className="field-input" value={name} onChange={e => setName(e.target.value)} placeholder="e.g. Kenda" autoCapitalize="words" autoFocus />
              </div>
              <div className="field-group">
                <span className="field-label">Phone number</span>
                <input className="field-input" value={phone} onChange={e => setPhone(e.target.value)} placeholder="(415) 555-0100" type="tel" />
                <div className="phone-hint">Used for crew check-in texts. US numbers only.</div>
              </div>
            </>
          )}

          {step === 1 && (
            <>
              <div className="field-group">
                <span className="field-label">Home mountain</span>
                <ResortPicker value={mountain} onChange={setMountain} />
              </div>
              <div className="field-group">
                <span className="field-label">Driving from (default)</span>
                <AddressAutocomplete value={city} onChange={setCity} placeholder="Your city or address" />
              </div>
            </>
          )}

          {step === 2 && (
            <div className="section-prefs-grid">
              {ALL_SECTIONS.map(s => (
                <div key={s} className={`pref-toggle${sections.has(s) ? ' on' : ''}`} onClick={() => toggleSection(s)}>
                  <div className="pref-check">{sections.has(s) ? '✓' : ''}</div>
                  <span className="pref-label">{SECTION_LABELS[s]}</span>
                </div>
              ))}
            </div>
          )}

          {step === 3 && (
            <div className="crew-options">
              <button className={`crew-option-btn${crewMode==='create'?' selected':''}`} onClick={() => setCrewMode('create')}>
                <div className="crew-option-title">Create a crew</div>
                <div className="crew-option-sub">Start a group and invite friends with a code</div>
              </button>
              {crewMode === 'create' && (
                <div className="field-group" style={{marginLeft:16}}>
                  <span className="field-label">Crew name</span>
                  <input className="field-input" value={crewName} onChange={e => setCrewName(e.target.value)} placeholder="e.g. Tahoe Crew" autoCapitalize="words" />
                </div>
              )}
              <button className={`crew-option-btn${crewMode==='join'?' selected':''}`} onClick={() => setCrewMode('join')}>
                <div className="crew-option-title">Join a crew</div>
                <div className="crew-option-sub">Enter an invite code from a friend</div>
              </button>
              {crewMode === 'join' && (
                <div className="field-group" style={{marginLeft:16}}>
                  <span className="field-label">Invite code</span>
                  <input className="field-input crew-code-input" value={crewCode} onChange={e => setCrewCode(e.target.value.toUpperCase().slice(0,6))} placeholder="ABC123" maxLength={6} />
                </div>
              )}
            </div>
          )}
        </div>

        <div className="onboard-actions">
          {step < 3 ? (
            <>
              <button className="onboard-btn-primary"
                disabled={
                  (step === 0 && (!name.trim() || phone.replace(/\D/g,'').length < 10)) ||
                  false
                }
                onClick={() => setStep(s => s + 1)}>
                Continue <i className="ti ti-arrow-right" style={{fontSize:14}} />
              </button>
            </>
          ) : (
            <>
              <button className="onboard-btn-primary" disabled={saving} onClick={finish}>
                {saving ? <><i className="ti ti-loader-2 spin" style={{fontSize:14}} />Saving…</> : <>Let\'s go <i className="ti ti-check" style={{fontSize:14}} /></>}
              </button>
              {!crewMode && <button className="onboard-btn-skip" onClick={finish}>Skip</button>}
            </>
          )}
        </div>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════════════════
   SECTION CARD
════════════════════════════════════════════════════════ */
function SectionCard({ section, content, loading, resort }) {
  const meta = SECTION_META[section];
  const isPalisades = resort && resort.parking != null;
  const isTahoe = resort && ["Palisades Tahoe","Alpine Meadows","Sierra-at-Tahoe"].includes(resort.name);
  const links = [];
  if (section === "road" && isTahoe)    { links.push(<a key="ct" href="https://quickmap.dot.ca.gov/" target="_blank" rel="noopener noreferrer" className="ql-btn ql-orange"><i className="ti ti-map-2" style={{fontSize:11}}/> Caltrans</a>); }
  if (section === "parking" && isPalisades) {
    links.push(<a key="map" href="https://www.parkpalisadestahoe.com/mapnpark" target="_blank" rel="noopener noreferrer" className="ql-btn ql-cyan"><i className="ti ti-parking" style={{fontSize:11}}/> Map N Park</a>);
    links.push(<a key="mtn" href="https://www.mountaineertransit.org/" target="_blank" rel="noopener noreferrer" className="ql-btn ql-cyan"><i className="ti ti-bus" style={{fontSize:11}}/> Mountaineer</a>);
  }
  if (section === "weather" && resort?.opensnow) {
    links.push(<a key="os" href={`https://opensnow.com/dailysnow/${resort.opensnow}`} target="_blank" rel="noopener noreferrer" className="ql-btn ql-cyan"><i className="ti ti-snowflake" style={{fontSize:11}}/> OpenSnow</a>);
  }
  if (section === "field" && resort?.unofficialAlpine) {
    links.push(<a key="ua" href="https://unofficialalpine.com/" target="_blank" rel="noopener noreferrer" className="ql-btn ql-green"><i className="ti ti-external-link" style={{fontSize:11}}/> Unofficial Alpine</a>);
  }
  return (
    <div className="section-card">
      <div className="card-header">
        <div className="card-label-group">
          <div className="card-icon" style={{background: meta.accent + "18"}}>
            <i className={`ti ${meta.icon}`} style={{fontSize:15, color: meta.accent}} />
          </div>
          <span className="card-title" style={{color: meta.accent}}>{meta.label}</span>
        </div>
        {links.length > 0 && <div className="card-links">{links}</div>}
      </div>
      {loading ? (
        <div className="pulse-row">
          {[0,1,2].map(i => <div key={i} className="pulse-dot" style={{background: meta.accent}} />)}
          <span className="pulse-label">Fetching…</span>
        </div>
      ) : (
        <div className={`card-body${!content?" card-body-empty":""}`}>{content || "No data retrieved"}</div>
      )}
    </div>
  );
}

/* ════════════════════════════════════════════════════════
   BRIEFING TAB
════════════════════════════════════════════════════════ */
function BriefingTab({ profile, showToast }) {
  const homeMountain = profile?.home_mountain ? IKON_RESORTS.find(r => r.name === profile.home_mountain) : null;
  const [resort, setResort] = useState(homeMountain || null);
  const [origin, setOrigin] = useState(profile?.departure_city || "San Francisco, CA");
  const [date, setDate]     = useState(new Date().toISOString().slice(0, 10));
  const [loading, setLoading] = useState(false);
  const [result, setResult]   = useState(null);
  const [error, setError]     = useState(null);
  const [heroLoaded, setHeroLoaded] = useState(false);

  useEffect(() => { setHeroLoaded(false); }, [resort]);

  const activeSections = profile?.section_prefs || ALL_SECTIONS;
  const today     = new Date(date + "T12:00:00");
  const dateLabel = today.toLocaleDateString("en-US", { weekday:"long", month:"long", day:"numeric", year:"numeric" });
  const dayOfWeek = today.toLocaleDateString("en-US", { weekday:"long" });
  const isWeekend = ["Saturday","Sunday"].includes(dayOfWeek);
  const isTahoe   = resort && ["Palisades Tahoe","Alpine Meadows","Sierra-at-Tahoe"].includes(resort.name);

  async function fetchBriefing() {
    if (!resort) return;
    setLoading(true); setError(null); setResult(null);
    const avalancheSource = resort.avalanche !== "N/A" ? `Sierra Avalanche Center at https://www.sierraavalanchecenter.org/` : `regional avalanche center for ${resort.name}`;
    const placerNote = isTahoe ? `Also search for Placer County Sheriff alerts and Caltrans chain control on ${resort.highways.join(", ")}.` : `Check chain control/incidents on ${resort.highways.join(", ")}.`;
    const parkingBlock = resort.parking ? `5. PARKING: Search parkpalisadestahoe.com. Today is ${dayOfWeek}. ${isWeekend ? "Weekend: reservations required." : "Weekday: first-come first-served."} Mountaineer wait estimate.` : `5. PARKING: General parking info for ${resort.name}.`;
    const uaBlock = resort.unofficialAlpine ? `1. FIELD REPORT: Fetch https://unofficialalpine.com/ and summarize the most recent conditions post. 3-4 sentences.` : `1. FIELD REPORT: Search for the most recent community conditions report for ${resort.name}.`;
    const prompt = `You are a ski day prep assistant. Today is ${dateLabel} (${dayOfWeek}). The skier is driving from ${origin} to ${resort.name} (${resort.state}, ${resort.elevation.toLocaleString()} ft).\n\nCompile a complete ski day briefing:\n\n${uaBlock}\n\n2. ROAD & TRAFFIC: ${resort.highways.join(", ")} between ${origin} and ${resort.name}. Drive time, closures, chain control. ${placerNote}\n\n3. LIFTS: ${resort.url} — open and closed lifts.\n\n4. TRAILS: Same — open run counts by difficulty.\n\n${parkingBlock}\n\n6. AVALANCHE: ${avalancheSource} — danger rating, hazard type, terrain to avoid.\n\n7. WEATHER: Temp, wind, precipitation for ${resort.name} today. Gear list.\n\n8. GAME PLAN: 4-5 bullet points — departure time, parking strategy, best zones, go/no-go.\n\nUse EXACTLY these section headers:\nFIELD REPORT:\nROAD:\nLIFTS:\nTRAILS:\nPARKING:\nAVALANCHE:\nWEATHER:\nGAME PLAN:`;

    try {
      const res = await fetch("/api/chat", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ model: "claude-sonnet-4-5", max_tokens: 1800, tools: [{ type: "web_search_20250305", name: "web_search" }], messages: [{ role: "user", content: prompt }] }) });
      if (!res.ok) { const e = await res.json(); throw new Error(e.error?.message || "API error"); }
      const data = await res.json();
      const text = data.content.filter(b => b.type === "text").map(b => b.text).join("\n");
      const parsed = {};
      for (const k of ALL_SECTIONS) parsed[k] = parseSection(text, k);
      setResult(parsed);
    } catch(e) { setError(e.message); }
    finally { setLoading(false); }
  }

  const heroImg = (resort?.img) || "https://images.unsplash.com/photo-1551698618-1dfe5d97d256?w=1200&q=80";
  const chips = resort ? resort.highways.map(hw => ({ hw, dot: HIGHWAY_DOT[hw] })).filter(x => x.dot) : [];
  const mapsUrl = resort ? `https://maps.google.com/?daddr=${encodeURIComponent(resort.name + ', ' + resort.state)}` : '#';
  const wazeUrl = resort ? `https://waze.com/ul?q=${encodeURIComponent(resort.name)}&navigate=yes` : '#';

  return (
    <>
      <div className="hero">
        <img className="hero-img" src={heroImg} alt="" onLoad={() => setHeroLoaded(true)} style={{opacity: heroLoaded ? 1 : 0}} />
        <div className="hero-overlay" />
        <div className="hero-content">
          <div className="hero-eyebrow">
            {resort ? `${resort.region} · ${resort.elevation.toLocaleString()} ft · Ikon Pass` : profile ? `Welcome back, ${profile.name}` : "Ikon Pass · SkiBrief"}
            {resort?.opensnow && (
              <a href={`https://opensnow.com/dailysnow/${resort.opensnow}`} target="_blank" rel="noopener noreferrer" className="hero-os-badge">
                <i className="ti ti-snowflake" style={{fontSize:9}} /> OpenSnow
              </a>
            )}
          </div>
          <div className="hero-title">{resort ? resort.name : "Where are\nyou skiing?"}</div>
          <div className="hero-sub">{resort ? `${resort.state} · ${resort.highways.join(" · ")} · ${dateLabel}` : "Live conditions · road alerts · avalanche · game plan"}</div>
        </div>
      </div>

      <div className="controls">
        <div className="field-group" style={{flex:2, minWidth:180}}>
          <span className="field-label">Resort</span>
          <ResortPicker value={resort?.name || null} onChange={name => { const r = IKON_RESORTS.find(x => x.name === name); setResort(r||null); setResult(null); setError(null); }} />
        </div>
        <div className="field-group" style={{flex:2, minWidth:150}}>
          <span className="field-label">Driving from</span>
          <AddressAutocomplete value={origin} onChange={setOrigin} placeholder="Your city or address…" />
        </div>
        <div className="field-group" style={{flex:1, minWidth:130}}>
          <span className="field-label">Date</span>
          <input className="field-input" type="date" value={date} onChange={e => setDate(e.target.value)} />
        </div>
        <button className="cta-btn" onClick={fetchBriefing} disabled={loading || !resort}>
          {loading ? <><i className="ti ti-loader-2 spin" style={{fontSize:14}} />Loading…</> : <><i className="ti ti-refresh" style={{fontSize:14}} />Get briefing</>}
        </button>
      </div>

      {resort?.opensnow && (
        <div className="opensnow-panel">
          <div className="os-badge"><i className="ti ti-snowflake" style={{fontSize:12}} /> OpenSnow</div>
          <div className="os-links">
            <a href={`https://opensnow.com/dailysnow/${resort.opensnow}`} target="_blank" rel="noopener noreferrer" className="os-link">Daily snow ↗</a>
            <span className="os-divider">·</span>
            <a href={`https://opensnow.com/location/${resort.opensnow}`} target="_blank" rel="noopener noreferrer" className="os-link">Conditions ↗</a>
            <span className="os-divider">·</span>
            <a href={`https://opensnow.com/forecast/${resort.opensnow}`} target="_blank" rel="noopener noreferrer" className="os-link">7-day ↗</a>
          </div>
          <span className="os-powered">Powered by OpenSnow</span>
        </div>
      )}

      {chips.length > 0 && (
        <div className="traffic-panel">
          <div className="traffic-header"><i className="ti ti-road" style={{fontSize:13}} /> Roads</div>
          <div className="traffic-chips">
            {chips.map(({ hw, dot }) => <a key={hw} href={dot.url} target="_blank" rel="noopener noreferrer" className="traffic-chip">{hw} · {dot.name}</a>)}
            <a href={wazeUrl} target="_blank" rel="noopener noreferrer" className="traffic-chip traffic-chip-nav"><i className="ti ti-navigation" style={{fontSize:10}} /> Waze</a>
            <a href={mapsUrl} target="_blank" rel="noopener noreferrer" className="traffic-chip traffic-chip-nav"><i className="ti ti-map-2" style={{fontSize:10}} /> Maps</a>
          </div>
        </div>
      )}

      {resort && (
        <div className="quick-links">
          {resort.opensnow && <a href={`https://opensnow.com/dailysnow/${resort.opensnow}`} target="_blank" rel="noopener noreferrer" className="ql-btn ql-cyan"><i className="ti ti-snowflake" style={{fontSize:11}}/> OpenSnow forecast</a>}
          {resort.unofficialAlpine && <a href="https://unofficialalpine.com/" target="_blank" rel="noopener noreferrer" className="ql-btn ql-green"><i className="ti ti-pencil" style={{fontSize:11}}/> Unofficial Alpine</a>}
          {resort.parking && <a href="https://www.parkpalisadestahoe.com/mapnpark" target="_blank" rel="noopener noreferrer" className="ql-btn ql-cyan"><i className="ti ti-parking" style={{fontSize:11}}/> Map N Park</a>}
          {isTahoe && <a href="https://member.everbridge.net/453003085611269/login" target="_blank" rel="noopener noreferrer" className="ql-btn ql-orange"><i className="ti ti-shield-check" style={{fontSize:11}}/> Placer Co. alerts</a>}
          <a href={resort.url} target="_blank" rel="noopener noreferrer" className="ql-btn ql-amber"><i className="ti ti-mountain" style={{fontSize:11}}/> Mountain report</a>
        </div>
      )}

      {isTahoe && (
        <div className="tahoe-notice">
          <i className="ti ti-alert-triangle" style={{fontSize:14, flexShrink:0, marginTop:1}} />
          <span>Tahoe resort — includes Placer County alerts, Caltrans chain control, and Mountaineer wait estimate. Live alerts: <a href="https://member.everbridge.net/453003085611269/login" target="_blank" rel="noopener noreferrer">Everbridge ↗</a></span>
        </div>
      )}

      {error && <div className="error-bar"><i className="ti ti-alert-circle" style={{fontSize:14}} />{error}. Check your connection and try again.</div>}

      {result && (
        <div style={{padding:"16px 28px 0"}}>
          <div className="result-pill"><i className="ti ti-check" style={{fontSize:11}} /> Live briefing · {resort?.name} · {dateLabel}</div>
        </div>
      )}

      {(loading || result) && (
        <div className="cards appear">
          {activeSections.map(s => <SectionCard key={s} section={s} content={result && result[s]} loading={loading && !result} resort={resort} />)}
        </div>
      )}

      {!loading && !result && !error && (
        <div className="empty">
          <i className="ti ti-mountain empty-icon" />
          <div className="empty-text">
            {profile?.home_mountain ? `${resort ? 'Hit Get Briefing to load live conditions' : 'Your home mountain is ' + profile.home_mountain}` : 'Search for an Ikon Pass resort above,\nset your departure city and date, then hit Get Briefing.'}
          </div>
        </div>
      )}
    </>
  );
}

/* ════════════════════════════════════════════════════════
   CREW TAB
════════════════════════════════════════════════════════ */
function CrewTab({ profile, showToast }) {
  const [crewData, setCrewData] = useState(null);
  const [loadingCrew, setLoadingCrew] = useState(false);
  const [sendingCheckin, setSendingCheckin] = useState(false);
  const [checkinDate, setCheckinDate] = useState(tomorrowStr());

  const crew = profile?.crew;

  useEffect(() => {
    if (crew?.id) loadCrew(crew.id);
  }, [crew?.id]);

  async function loadCrew(id) {
    setLoadingCrew(true);
    try {
      const r = await fetch(`/api/crew?id=${id}`);
      if (r.ok) setCrewData(await r.json());
    } catch {}
    setLoadingCrew(false);
  }

  async function sendCheckin() {
    if (!profile?.id || !crew?.id) return;
    setSendingCheckin(true);
    try {
      const r = await fetch('/api/checkin', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ crew_id: crew.id, profile_id: profile.id, date: checkinDate }),
      });
      const data = await r.json();
      if (r.ok) {
        showToast(`📲 Check-in sent to ${data.members_count} crew member${data.members_count !== 1 ? 's' : ''}!`);
        setTimeout(() => loadCrew(crew.id), 1000);
      } else {
        showToast(`Error: ${data.error}`);
      }
    } catch (e) { showToast('Failed to send check-in'); }
    setSendingCheckin(false);
  }

  async function copyInvite() {
    const code = crewData?.crew?.invite_code || crew?.invite_code;
    if (!code) return;
    try { await navigator.clipboard.writeText(code); showToast(`📋 Code ${code} copied!`); }
    catch { showToast(`Invite code: ${code}`); }
  }

  if (!crew) {
    return (
      <div className="crew-root">
        <div className="crew-empty-state">
          <span className="crew-empty-icon">👥</span>
          <div className="crew-empty-title">No crew yet</div>
          <div className="crew-empty-sub">Create a crew or join one with an invite code. Your whole group will get SMS check-ins and see each other's plans.</div>
          <button className="crew-setup-btn" onClick={() => {}}>
            <i className="ti ti-users-plus" style={{fontSize:15}} /> Set up a crew
          </button>
          <div style={{marginTop:8, fontSize:12, color:'rgba(255,255,255,0.2)'}}>
            (Go to Profile tab → Crew to get started)
          </div>
        </div>
      </div>
    );
  }

  const members  = crewData?.members   || [];
  const reactions= crewData?.reactions || [];
  const checkIn  = crewData?.check_in;

  const memberStatus = members.map(m => {
    const rxn = reactions.find(r => r.profile_id === m.profile_id);
    return { ...m, activity: rxn?.activity || null, reacted_at: rxn?.reacted_at || null };
  }).sort((a, b) => {
    if (a.activity && !b.activity) return -1;
    if (!a.activity && b.activity) return 1;
    return 0;
  });

  const dateLabel = checkin => {
    if (!checkin) return '';
    const d = new Date(checkin.date + 'T12:00:00');
    return d.toLocaleDateString('en-US', { weekday:'long', month:'short', day:'numeric' });
  };

  const crewName  = crewData?.crew?.name  || crew?.name  || 'Your Crew';
  const inviteCode= crewData?.crew?.invite_code || crew?.invite_code || '';

  return (
    <div className="crew-root">
      <div className="crew-page-header">
        <div className="crew-page-eyebrow">Your crew</div>
        <div className="crew-page-title">{crewName}</div>
      </div>

      {checkIn && (
        <div className="crew-section">
          <div className="date-strip">
            <div className="date-strip-line" />
            <span>{dateLabel(checkIn)}</span>
            <div className="date-strip-line" />
          </div>
          <div className="crew-member-list">
            {memberStatus.length === 0 ? (
              <div style={{color:'rgba(255,255,255,0.3)', fontSize:13, padding:'8px 0'}}>No responses yet.</div>
            ) : (
              memberStatus.map((m, i) => {
                const act = m.activity ? ACTIVITIES[m.activity] : null;
                const isMe = m.profile_id === profile?.id;
                return (
                  <div key={i} className="crew-member-row">
                    <div className="crew-member-emoji">{act ? act.emoji : '·'}</div>
                    <div className="crew-member-info">
                      <div className="crew-member-name">
                        {m.name}
                        {isMe && <span className="you-badge">you</span>}
                      </div>
                      <div className={`crew-member-activity${act ? ' ' + act.color : ' pending-dot'}`}>
                        {act ? act.label : 'No response yet'}
                      </div>
                    </div>
                    {m.reacted_at && <div className="crew-member-time">{formatTime(m.reacted_at)}</div>}
                  </div>
                );
              })
            )}
          </div>
        </div>
      )}

      <div className="crew-section">
        <div className="crew-section-label">Send check-in</div>
        <div style={{display:'flex', gap:8, marginBottom:10}}>
          <div className="field-group" style={{flex:1}}>
            <span className="field-label">For date</span>
            <input className="field-input" type="date" value={checkinDate} onChange={e => setCheckinDate(e.target.value)} min={todayStr()} />
          </div>
        </div>
        <button className="checkin-btn" onClick={sendCheckin} disabled={sendingCheckin || !profile?.id}>
          {sendingCheckin
            ? <><i className="ti ti-loader-2 spin" style={{fontSize:15}} /> Sending…</>
            : <><i className="ti ti-send" style={{fontSize:15}} /> Text crew for {new Date(checkinDate + 'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}</>
          }
        </button>
        <div className="sent-note">
          Each member gets an SMS with one-tap links: Skiing · Lake · Golf · Home
        </div>
      </div>

      <div className="crew-section">
        <div className="crew-section-label">Invite</div>
        <div className="invite-row">
          <div className="invite-code">{inviteCode || '———'}</div>
          <button className="copy-btn" onClick={copyInvite}>Copy code</button>
        </div>
        <div style={{marginTop:8, fontSize:11, color:'rgba(255,255,255,0.25)'}}>Share this code so friends can join your crew.</div>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════════════════
   PROFILE TAB
════════════════════════════════════════════════════════ */
function ProfileTab({ profile, setProfile, showToast }) {
  const [name, setName]         = useState(profile?.name || '');
  const [phone, setPhone]       = useState(profile?.phone || '');
  const [city, setCity]         = useState(profile?.departure_city || '');
  const [mountain, setMountain] = useState(profile?.home_mountain || null);
  const [sections, setSections] = useState(new Set(profile?.section_prefs || ALL_SECTIONS));
  const [crewCode, setCrewCode] = useState('');
  const [crewName, setCrewName] = useState('');
  const [joiningCrew, setJoiningCrew] = useState(false);
  const [creatingCrew, setCreatingCrew] = useState(false);
  const [saved, setSaved]       = useState(false);
  const saveTimer               = useRef(null);

  function toggleSection(s) {
    setSections(prev => { const n = new Set(prev); if (n.has(s)) n.delete(s); else n.add(s); return n; });
  }

  async function saveChanges() {
    const updated = { ...profile, name, phone: phone.replace(/\D/g,'').slice(-10), home_mountain: mountain, departure_city: city, section_prefs: [...sections] };
    saveProfile(updated);
    setProfile(updated);
    setSaved(true);
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => setSaved(false), 2500);

    if (profile?.id) {
      try {
        await fetch('/api/profile', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id: profile.id, name, phone: updated.phone, home_mountain: mountain, departure_city: city, section_prefs: [...sections] }) });
      } catch {}
    }
  }

  async function joinCrew() {
    if (!crewCode.trim() || !profile?.id) return;
    setJoiningCrew(true);
    try {
      const r = await fetch('/api/crew', { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ invite_code: crewCode.trim(), profile_id: profile.id }) });
      const data = await r.json();
      if (r.ok) {
        const updated = { ...profile, crew: data };
        saveProfile(updated); setProfile(updated);
        showToast(`👥 Joined ${data.name}!`); setCrewCode('');
      } else { showToast(`Error: ${data.error}`); }
    } catch { showToast('Failed to join crew'); }
    setJoiningCrew(false);
  }

  async function createCrew() {
    if (!crewName.trim() || !profile?.id) return;
    setCreatingCrew(true);
    try {
      const r = await fetch('/api/crew', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name: crewName.trim(), profile_id: profile.id }) });
      const data = await r.json();
      if (r.ok) {
        const updated = { ...profile, crew: data };
        saveProfile(updated); setProfile(updated);
        showToast(`✅ ${data.name} created! Code: ${data.invite_code}`); setCrewName('');
      } else { showToast(`Error: ${data.error}`); }
    } catch { showToast('Failed to create crew'); }
    setCreatingCrew(false);
  }

  function resetApp() {
    if (!confirm('Reset your profile? You\'ll go through setup again.')) return;
    localStorage.removeItem('skiProfile');
    window.location.reload();
  }

  return (
    <div className="profile-root">
      <div className="profile-header">
        <div className="profile-greeting">Your profile</div>
        <div className="profile-name">{profile?.name || 'Skier'}</div>
      </div>

      <div className="profile-section">
        <div className="profile-section-label">Personal info</div>
        <div className="profile-fields">
          <div className="field-group">
            <span className="field-label">Name</span>
            <input className="field-input" value={name} onChange={e => setName(e.target.value)} />
          </div>
          <div className="field-group">
            <span className="field-label">Phone (for SMS check-ins)</span>
            <input className="field-input" value={phone} onChange={e => setPhone(e.target.value)} type="tel" placeholder="(415) 555-0100" />
          </div>
        </div>
      </div>

      <div className="profile-section">
        <div className="profile-section-label">Skiing defaults</div>
        <div className="profile-fields">
          <div className="field-group">
            <span className="field-label">Home mountain</span>
            <ResortPicker value={mountain} onChange={setMountain} />
          </div>
          <div className="field-group">
            <span className="field-label">Driving from</span>
            <AddressAutocomplete value={city} onChange={setCity} placeholder="Your city or address" />
          </div>
        </div>
      </div>

      <div className="profile-section">
        <div className="profile-section-label">Briefing sections</div>
        <div className="section-prefs-grid">
          {ALL_SECTIONS.map(s => (
            <div key={s} className={`pref-toggle${sections.has(s)?' on':''}`} onClick={() => toggleSection(s)}>
              <div className="pref-check">{sections.has(s)?'✓':''}</div>
              <span className="pref-label">{SECTION_LABELS[s]}</span>
            </div>
          ))}
        </div>
      </div>

      <div style={{padding:'16px 28px'}}>
        <button className="cta-btn" style={{width:'100%', justifyContent:'center'}} onClick={saveChanges}>
          {saved ? <><i className="ti ti-check" style={{fontSize:14}} /> Saved!</> : <><i className="ti ti-device-floppy" style={{fontSize:14}} /> Save changes</>}
        </button>
      </div>

      <div className="profile-section">
        <div className="profile-section-label">Crew</div>
        {profile?.crew ? (
          <div>
            <div style={{fontSize:14, color:'#e8edf2', fontWeight:500, marginBottom:4}}>{profile.crew.name}</div>
            <div style={{fontSize:12, color:'rgba(255,255,255,0.35)', marginBottom:12}}>Invite code: <strong style={{color:'rgba(255,255,255,0.6)', letterSpacing:'0.1em'}}>{profile.crew.invite_code}</strong></div>
            <button className="danger-btn" onClick={async () => {
              if (!confirm('Leave this crew?')) return;
              if (profile?.id && profile?.crew?.id) {
                await fetch('/api/crew', { method:'DELETE', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ crew_id: profile.crew.id, profile_id: profile.id }) });
              }
              const updated = { ...profile, crew: null };
              saveProfile(updated); setProfile(updated);
              showToast('Left crew.');
            }}>Leave crew</button>
          </div>
        ) : (
          <div style={{display:'flex', flexDirection:'column', gap:12}}>
            <div style={{display:'flex', gap:8}}>
              <div className="field-group" style={{flex:1}}>
                <span className="field-label">Create new crew</span>
                <input className="field-input" value={crewName} onChange={e => setCrewName(e.target.value)} placeholder="e.g. Tahoe Crew" autoCapitalize="words" />
              </div>
              <button className="cta-btn" style={{alignSelf:'flex-end', padding:'9px 14px', fontSize:12}} onClick={createCrew} disabled={creatingCrew || !crewName.trim()}>
                {creatingCrew ? <i className="ti ti-loader-2 spin" style={{fontSize:13}} /> : 'Create'}
              </button>
            </div>
            <div style={{display:'flex', gap:8}}>
              <div className="field-group" style={{flex:1}}>
                <span className="field-label">Join with code</span>
                <input className="field-input crew-code-input" value={crewCode} onChange={e => setCrewCode(e.target.value.toUpperCase().slice(0,6))} placeholder="ABC123" maxLength={6} />
              </div>
              <button className="cta-btn" style={{alignSelf:'flex-end', padding:'9px 14px', fontSize:12}} onClick={joinCrew} disabled={joiningCrew || crewCode.length < 4}>
                {joiningCrew ? <i className="ti ti-loader-2 spin" style={{fontSize:13}} /> : 'Join'}
              </button>
            </div>
          </div>
        )}
      </div>

      <div className="profile-section">
        <button className="danger-btn" onClick={resetApp}>Reset profile &amp; start over</button>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════════════════
   BOTTOM NAV
════════════════════════════════════════════════════════ */
function BottomNav({ activeTab, setActiveTab }) {
  return (
    <nav className="bottom-nav">
      <div className="bottom-nav-inner">
        <button className={`nav-item${activeTab==='briefing'?' active':''}`} onClick={() => setActiveTab('briefing')}>
          <i className="ti ti-mountain" />Briefing
        </button>
        <button className={`nav-item${activeTab==='crew'?' active':''}`} onClick={() => setActiveTab('crew')}>
          <i className="ti ti-users" />Crew
        </button>
        <button className={`nav-item${activeTab==='profile'?' active':''}`} onClick={() => setActiveTab('profile')}>
          <i className="ti ti-user" />Profile
        </button>
      </div>
    </nav>
  );
}

/* ════════════════════════════════════════════════════════
   APP ROOT
════════════════════════════════════════════════════════ */
function App() {
  const [profile, setProfileState] = useState(() => loadProfile());
  const [activeTab, setActiveTab]  = useState('briefing');
  const [toast, setToast]          = useState(null);
  const toastRef = useRef(null);

  function setProfile(p) { setProfileState(p); saveProfile(p); }

  function showToast(msg, duration = 2800) {
    if (toastRef.current) clearTimeout(toastRef.current);
    setToast(msg);
    toastRef.current = setTimeout(() => setToast(null), duration);
  }

  function handleOnboardingComplete(p) { setProfile(p); }

  if (!profile) {
    return <Onboarding onComplete={handleOnboardingComplete} />;
  }

  return (
    <div className="ski-root">
      {activeTab === 'briefing' && <BriefingTab profile={profile} showToast={showToast} />}
      {activeTab === 'crew'     && <CrewTab profile={profile} showToast={showToast} />}
      {activeTab === 'profile'  && <ProfileTab profile={profile} setProfile={setProfile} showToast={showToast} />}
      <BottomNav activeTab={activeTab} setActiveTab={setActiveTab} />
      {toast && (
        <div className="toast">
          <i className="ti ti-check" style={{fontSize:13, color:'#A8FF78'}} />
          {toast}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
