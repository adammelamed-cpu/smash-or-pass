<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Ski Day Briefing</title>

<!-- PWA -->
<meta name="theme-color" content="#0a0e14" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="SkiBrief" />
<link rel="manifest" href="/manifest.json" />
<link rel="apple-touch-icon" href="/icon.svg" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet" />
<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { min-height: 100vh; background: #0a0e14; }
  body { font-family: 'Barlow', sans-serif; color: #e8edf2; }

  .ski-root {
    background: #0a0e14; min-height: 100vh; width: 100%; max-width: 960px; margin: 0 auto;
    padding-bottom: calc(64px + env(safe-area-inset-bottom, 0px));
  }

  /* Hero */
  .hero { position: relative; height: 300px; overflow: hidden; display: flex; align-items: flex-end; }
  .hero-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; filter: brightness(0.42) saturate(1.15); transition: opacity 0.9s ease; }
  .hero-overlay { position: absolute; inset: 0; background: linear-gradient(to top, #0a0e14 0%, rgba(10,14,20,0.3) 60%, transparent 100%); }
  .hero-content { position: relative; padding: 0 28px 28px; width: 100%; }
  .hero-eyebrow { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; color: #00BFFF; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
  .hero-os-badge { display: inline-flex; align-items: center; gap: 4px; background: rgba(0,191,255,0.15); border: 1px solid rgba(0,191,255,0.3); border-radius: 3px; padding: 2px 7px; font-size: 9px; font-weight: 700; letter-spacing: 0.12em; color: #00BFFF; text-decoration: none; }
  .hero-os-badge:hover { background: rgba(0,191,255,0.25); }
  .hero-title { font-family: 'Barlow Condensed', sans-serif; font-size: 52px; font-weight: 800; line-height: 0.95; text-transform: uppercase; color: #fff; margin: 0 0 6px; }
  .hero-sub { font-size: 13px; font-weight: 300; color: rgba(255,255,255,0.55); }

  /* Controls */
  .controls { background: #111620; border-bottom: 1px solid rgba(255,255,255,0.07); padding: 18px 28px; display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
  .field-group { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 140px; }
  .field-label { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; color: rgba(255,255,255,0.38); }
  .field-input { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 4px; color: #e8edf2; font-family: 'Barlow', sans-serif; font-size: 13px; padding: 9px 12px; outline: none; width: 100%; transition: border-color 0.2s; }
  .field-input:focus { border-color: #00BFFF; }
  .field-input::placeholder { color: rgba(255,255,255,0.22); }
  .field-input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.6); cursor: pointer; }

  /* Resort badge */
  .resort-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(0,191,255,0.12); border: 1px solid rgba(0,191,255,0.35); border-radius: 4px; padding: 8px 12px; font-size: 13px; color: #00BFFF; font-weight: 500; cursor: default; }
  .resort-badge-state { opacity: 0.5; font-size: 11px; }
  .resort-badge-remove { background: none; border: none; cursor: pointer; color: rgba(0,191,255,0.55); font-size: 17px; line-height: 1; padding: 0; margin-left: 2px; transition: color 0.15s; }
  .resort-badge-remove:hover { color: #00BFFF; }

  /* Dropdown */
  .dropdown-wrap { position: relative; }
  .dropdown { position: absolute; top: calc(100% + 5px); left: 0; right: 0; z-index: 300; background: #1a2030; border: 1px solid rgba(255,255,255,0.13); border-radius: 6px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.7); }
  .dropdown-item { padding: 11px 14px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; color: #c8d4e0; transition: background 0.1s; }
  .dropdown-item:last-child { border-bottom: none; }
  .dropdown-item:hover { background: rgba(0,191,255,0.09); }
  .dropdown-tags { display: flex; gap: 5px; align-items: center; }
  .tag { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 3px; letter-spacing: 0.06em; }
  .tag-os { background: rgba(0,191,255,0.14); color: #00BFFF; border: 1px solid rgba(0,191,255,0.28); }
  .tag-ua { background: rgba(168,255,120,0.12); color: #A8FF78; border: 1px solid rgba(168,255,120,0.28); }
  .tag-st { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.42); border: 1px solid rgba(255,255,255,0.1); }
  .dropdown-empty { padding: 13px 14px; color: rgba(255,255,255,0.28); font-size: 13px; }

  /* CTA */
  .cta-btn { background: #00BFFF; border: none; border-radius: 4px; color: #0a0e14; font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 0.09em; text-transform: uppercase; padding: 11px 24px; cursor: pointer; display: flex; align-items: center; gap: 7px; white-space: nowrap; transition: background 0.18s, opacity 0.18s; align-self: flex-end; }
  .cta-btn:hover:not(:disabled) { background: #33CCFF; }
  .cta-btn:disabled { opacity: 0.38; cursor: not-allowed; }

  /* OpenSnow Panel */
  .opensnow-panel { background: linear-gradient(to right, rgba(0,65,115,0.45), rgba(0,191,255,0.05)); border-bottom: 1px solid rgba(0,191,255,0.18); padding: 11px 28px; display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .os-badge { display: flex; align-items: center; gap: 5px; background: rgba(0,191,255,0.14); border: 1px solid rgba(0,191,255,0.35); border-radius: 4px; padding: 5px 10px; font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: #00BFFF; flex-shrink: 0; }
  .os-links { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; flex: 1; }
  .os-link { font-size: 12px; color: rgba(160,220,255,0.75); text-decoration: none; transition: color 0.15s; letter-spacing: 0.03em; }
  .os-link:hover { color: #00BFFF; }
  .os-divider { color: rgba(255,255,255,0.15); font-size: 11px; }
  .os-powered { font-size: 10px; color: rgba(255,255,255,0.18); margin-left: auto; white-space: nowrap; font-style: italic; }

  /* Traffic Panel */
  .traffic-panel { background: rgba(255,107,53,0.04); border-bottom: 1px solid rgba(255,107,53,0.1); padding: 8px 28px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .traffic-header { display: flex; align-items: center; gap: 5px; font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,107,53,0.7); flex-shrink: 0; }
  .traffic-chips { display: flex; gap: 5px; flex-wrap: wrap; }
  .traffic-chip { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; color: rgba(255,130,70,0.8); border: 1px solid rgba(255,107,53,0.22); border-radius: 3px; padding: 4px 9px; text-decoration: none; background: none; transition: all 0.15s; font-family: 'Barlow', sans-serif; white-space: nowrap; }
  .traffic-chip:hover { background: rgba(255,107,53,0.1); color: #FF8040; border-color: rgba(255,107,53,0.4); }
  .traffic-chip-nav { color: rgba(100,210,100,0.8); border-color: rgba(100,200,100,0.2); }
  .traffic-chip-nav:hover { background: rgba(100,200,100,0.1); color: #A8FF78; border-color: rgba(168,255,120,0.4); }

  /* Notification bar */
  .notif-bar { margin: 12px 28px 0; padding: 10px 14px; background: rgba(0,191,255,0.05); border: 1px solid rgba(0,191,255,0.15); border-radius: 6px; display: flex; align-items: center; gap: 10px; font-size: 12px; color: rgba(160,220,255,0.7); }
  .notif-bar-btn { margin-left: auto; background: rgba(0,191,255,0.14); border: 1px solid rgba(0,191,255,0.28); border-radius: 4px; padding: 4px 11px; font-size: 11px; font-weight: 600; color: #00BFFF; cursor: pointer; font-family: 'Barlow Condensed', sans-serif; letter-spacing: 0.08em; text-transform: uppercase; white-space: nowrap; transition: background 0.15s; }
  .notif-bar-btn:hover { background: rgba(0,191,255,0.25); }
  .notif-bar.confirmed { background: rgba(168,255,120,0.05); border-color: rgba(168,255,120,0.15); color: rgba(168,255,120,0.65); }

  /* Quick links */
  .quick-links { padding: 11px 28px; display: flex; gap: 8px; flex-wrap: wrap; border-bottom: 1px solid rgba(255,255,255,0.05); background: #0d1118; }
  .ql-btn { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 500; font-family: 'Barlow', sans-serif; padding: 5px 11px; border-radius: 3px; border: 1px solid; text-decoration: none; letter-spacing: 0.04em; transition: opacity 0.15s; cursor: pointer; background: none; }
  .ql-btn:hover { opacity: 0.72; }
  .ql-cyan   { color: #00BFFF; border-color: rgba(0,191,255,0.3); }
  .ql-green  { color: #A8FF78; border-color: rgba(168,255,120,0.3); }
  .ql-amber  { color: #FFD700; border-color: rgba(255,215,0,0.3); }
  .ql-orange { color: #FF6B35; border-color: rgba(255,107,53,0.3); }

  /* Tahoe notice */
  .tahoe-notice { margin: 14px 28px 0; background: rgba(255,107,53,0.08); border: 1px solid rgba(255,107,53,0.25); border-radius: 6px; padding: 11px 15px; font-size: 12px; color: rgba(255,180,130,0.9); display: flex; gap: 9px; align-items: flex-start; line-height: 1.6; }
  .tahoe-notice a { color: #FF9A6C; text-decoration: none; font-weight: 600; }
  .tahoe-notice a:hover { text-decoration: underline; }

  /* Result header */
  .result-header { padding: 18px 28px 0; }
  .result-pill { display: inline-flex; align-items: center; gap: 6px; background: rgba(168,255,120,0.1); border: 1px solid rgba(168,255,120,0.25); border-radius: 20px; padding: 5px 14px; font-size: 11px; color: #A8FF78; font-family: 'Barlow Condensed', sans-serif; letter-spacing: 0.09em; text-transform: uppercase; }

  /* Cards */
  .cards { padding: 18px 28px 24px; display: flex; flex-direction: column; gap: 2px; }
  .section-card { background: #111620; border-bottom: 1px solid rgba(255,255,255,0.05); overflow: hidden; }
  .section-card:first-child { border-radius: 8px 8px 0 0; }
  .section-card:last-child  { border-radius: 0 0 8px 8px; border-bottom: none; }
  .card-header { display: flex; align-items: center; justify-content: space-between; padding: 15px 18px 0; gap: 10px; flex-wrap: wrap; }
  .card-label-group { display: flex; align-items: center; gap: 9px; }
  .card-icon { width: 28px; height: 28px; border-radius: 4px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .card-title { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 0.11em; text-transform: uppercase; }
  .card-links { display: flex; gap: 6px; flex-wrap: wrap; }
  .card-body { padding: 11px 18px 17px; font-size: 13px; line-height: 1.8; color: rgba(220,232,242,0.82); white-space: pre-wrap; }
  .card-body-empty { color: rgba(255,255,255,0.18); font-style: italic; }

  /* Pulse loader */
  .pulse-row { display: flex; gap: 5px; align-items: center; padding: 13px 18px 17px; }
  .pulse-dot { width: 5px; height: 5px; border-radius: 50%; animation: pulse-anim 1.1s ease-in-out infinite; }
  .pulse-dot:nth-child(2) { animation-delay: 0.16s; }
  .pulse-dot:nth-child(3) { animation-delay: 0.32s; }
  @keyframes pulse-anim { 0%,100%{opacity:.12} 50%{opacity:1} }
  .pulse-label { font-size: 12px; color: rgba(255,255,255,0.28); margin-left: 5px; }

  /* Error */
  .error-bar { margin: 14px 28px 0; background: rgba(255,80,80,0.1); border: 1px solid rgba(255,80,80,0.3); border-radius: 6px; padding: 11px 15px; font-size: 13px; color: #ff9090; display: flex; align-items: center; gap: 8px; }

  /* Empty */
  .empty { padding: 56px 28px; text-align: center; }
  .empty-icon { font-size: 44px; color: rgba(255,255,255,0.09); display: block; margin-bottom: 14px; }
  .empty-text { font-size: 13px; color: rgba(255,255,255,0.28); line-height: 1.8; }

  /* Address autocomplete */
  .addr-wrap { position: relative; width: 100%; }
  .addr-dropdown { position: absolute; top: calc(100% + 5px); left: 0; right: 0; z-index: 400; background: #1a2030; border: 1px solid rgba(255,255,255,0.13); border-radius: 6px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.7); }
  .addr-item { padding: 10px 13px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: flex-start; gap: 9px; transition: background 0.1s; }
  .addr-item:last-child { border-bottom: none; }
  .addr-item:hover, .addr-item.highlighted { background: rgba(0,191,255,0.09); }
  .addr-item-icon { color: rgba(0,191,255,0.5); font-size: 13px; margin-top: 1px; flex-shrink: 0; }
  .addr-item-main { font-size: 13px; color: #c8d4e0; line-height: 1.3; }
  .addr-item-sub  { font-size: 11px; color: rgba(255,255,255,0.32); margin-top: 1px; }
  .addr-spinner   { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 13px; color: rgba(0,191,255,0.5); }
  .addr-confirmed { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 13px; color: #A8FF78; }

  /* === BOTTOM NAVIGATION === */
  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000; background: rgba(13,18,28,0.97); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); border-top: 1px solid rgba(255,255,255,0.09); display: flex; justify-content: center; padding-bottom: env(safe-area-inset-bottom, 0px); }
  .bottom-nav-inner { display: flex; width: 100%; max-width: 960px; }
  .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 10px 0 9px; font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.32); cursor: pointer; border: none; background: none; transition: color 0.15s; position: relative; }
  .nav-item i { font-size: 22px; line-height: 1; }
  .nav-item.active { color: #00BFFF; }
  .nav-badge { position: absolute; top: 8px; right: calc(50% - 18px); background: #FFD700; color: #0a0e14; border-radius: 10px; font-size: 8px; font-weight: 800; padding: 1px 5px; min-width: 15px; text-align: center; letter-spacing: 0; }

  /* === PARTY TAB === */
  .party-root { min-height: calc(100vh - 64px); }
  .party-hero { padding: 32px 28px 24px; background: linear-gradient(160deg, #0f1c2e 0%, #0a0e14 100%); border-bottom: 1px solid rgba(255,255,255,0.07); }
  .party-hero-eyebrow { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; color: #A8FF78; margin-bottom: 8px; }
  .party-hero-title { font-family: 'Barlow Condensed', sans-serif; font-size: 42px; font-weight: 800; text-transform: uppercase; color: #fff; line-height: 1; }
  .party-hero-sub { font-size: 13px; color: rgba(255,255,255,0.38); margin-top: 7px; }

  .party-create { padding: 22px 28px; display: flex; flex-direction: column; gap: 10px; }
  .party-section-title { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(255,255,255,0.3); margin-bottom: 2px; }
  .party-row { display: flex; gap: 10px; }
  .create-btn { background: #A8FF78; border: none; border-radius: 6px; color: #0a1a06; font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 13px 24px; cursor: pointer; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; transition: background 0.18s; margin-top: 4px; }
  .create-btn:hover { background: #c4ffaa; }
  .create-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .create-hint { text-align: center; padding: 10px 0 4px; font-size: 12px; color: rgba(255,255,255,0.2); }

  /* Party card */
  .party-card { background: #111620; border-radius: 10px; margin: 18px 20px; border: 1px solid rgba(255,255,255,0.08); overflow: hidden; }
  .party-card-header { padding: 16px 18px 14px; border-bottom: 1px solid rgba(255,255,255,0.06); }
  .party-card-name { font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 800; text-transform: uppercase; color: #fff; }
  .party-card-meta { font-size: 11px; color: rgba(255,255,255,0.35); margin-top: 3px; display: flex; align-items: center; gap: 8px; }
  .party-full-banner { background: rgba(255,215,0,0.1); border-bottom: 1px solid rgba(255,215,0,0.2); padding: 10px 18px; display: flex; align-items: center; gap: 9px; font-size: 13px; color: #FFD700; font-weight: 500; }

  /* Member list */
  .member-list { padding: 4px 0; }
  .member-row { display: flex; align-items: center; gap: 10px; padding: 10px 18px; border-bottom: 1px solid rgba(255,255,255,0.04); }
  .member-row:last-child { border-bottom: none; }
  .member-emoji { font-size: 20px; width: 28px; text-align: center; flex-shrink: 0; }
  .member-info { flex: 1; min-width: 0; }
  .member-name-row { font-size: 13px; color: #e8edf2; font-weight: 500; display: flex; align-items: center; gap: 6px; }
  .member-you { font-size: 9px; color: #00BFFF; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; background: rgba(0,191,255,0.12); border-radius: 3px; padding: 1px 5px; }
  .member-status-text { font-size: 11px; color: rgba(255,255,255,0.38); margin-top: 2px; }
  .member-time { font-size: 10px; color: rgba(255,255,255,0.2); flex-shrink: 0; }
  .member-empty { padding: 20px 18px; font-size: 13px; color: rgba(255,255,255,0.25); text-align: center; font-style: italic; }

  /* Join input */
  .join-section { padding: 12px 18px 14px; border-top: 1px solid rgba(255,255,255,0.06); display: flex; gap: 8px; align-items: flex-end; }
  .join-section .field-group { flex: 1; }

  /* Your status */
  .your-status-section { padding: 14px 18px 16px; border-top: 1px solid rgba(255,255,255,0.06); }
  .your-status-label { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,0.3); margin-bottom: 10px; }
  .status-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
  @media (max-width: 360px) { .status-grid { grid-template-columns: repeat(3, 1fr); } }
  .status-btn { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 10px 4px 9px; display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; transition: all 0.15s; }
  .status-btn:hover { background: rgba(0,191,255,0.1); border-color: rgba(0,191,255,0.28); }
  .status-btn.selected { background: rgba(0,191,255,0.14); border-color: rgba(0,191,255,0.45); }
  .status-btn.selected-full { background: rgba(255,215,0,0.12); border-color: rgba(255,215,0,0.4); }
  .status-emoji { font-size: 22px; line-height: 1; }
  .status-label { font-size: 9px; color: rgba(255,255,255,0.45); text-align: center; line-height: 1.3; }
  .status-btn.selected .status-label { color: #00BFFF; }
  .status-btn.selected-full .status-label { color: #FFD700; }

  /* Share / actions */
  .party-actions { padding: 12px 18px 14px; border-top: 1px solid rgba(255,255,255,0.06); display: flex; flex-direction: column; gap: 8px; }
  .share-btn { display: flex; align-items: center; justify-content: center; gap: 8px; background: rgba(168,255,120,0.1); border: 1px solid rgba(168,255,120,0.28); border-radius: 6px; padding: 13px 20px; font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #A8FF78; cursor: pointer; transition: all 0.15s; }
  .share-btn:hover { background: rgba(168,255,120,0.18); }
  .share-btn.copied { color: #FFD700; border-color: rgba(255,215,0,0.3); background: rgba(255,215,0,0.08); }
  .leave-btn { font-size: 12px; color: rgba(255,255,255,0.22); background: none; border: none; cursor: pointer; text-align: center; padding: 4px; transition: color 0.15s; }
  .leave-btn:hover { color: rgba(255,80,80,0.5); }

  /* Toast */
  .toast { position: fixed; bottom: calc(74px + env(safe-area-inset-bottom, 0px)); left: 50%; transform: translateX(-50%); background: #1c2638; border: 1px solid rgba(0,191,255,0.28); border-radius: 8px; padding: 10px 18px; font-size: 13px; color: #e8edf2; display: flex; align-items: center; gap: 8px; z-index: 2000; animation: toast-in 0.3s ease; white-space: nowrap; pointer-events: none; box-shadow: 0 8px 30px rgba(0,0,0,0.5); }

/* ═══════════════════════════ HELPERS ═══════════════════════════ */
function parseSection(text, key) {
  const keys = SECTION_MARKERS[key];
  const otherKeys = Object.entries(SECTION_MARKERS).filter(([k]) => k !== key).flatMap(([,v]) => v);
  const lines = text.split("\n");
  let capturing = false, result = [];
  for (const line of lines) {
    const upper = line.trim().toUpperCase();
    if (!capturing && keys.some(k => upper.startsWith(k))) {
      capturing = true;
      const after = line.slice(line.indexOf(":") + 1).trim();
      if (after) result.push(after);
      continue;
    }
    if (capturing) {
      if (otherKeys.some(k => upper.startsWith(k))) break;
      result.push(line);
    }
  }
  return result.join("\n").trim();
}

function encodeParty(party) {
  try { return btoa(encodeURIComponent(JSON.stringify(party))); }
  catch { return null; }
}

function decodeParty(str) {
  try { return JSON.parse(decodeURIComponent(atob(str))); }
  catch { return null; }
}

function readPartyFromURL() {
  const p = new URLSearchParams(window.location.search).get('party');
  return p ? decodeParty(p) : null;
}

function writePartyToURL(party) {
  const u = new URL(window.location.href);
  if (party) u.searchParams.set('party', encodeParty(party));
  else u.searchParams.delete('party');
  window.history.replaceState({}, '', u.toString());
  return u.toString();
}

function formatTime(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
}

/* ═══════════════════════════ ADDRESS AUTOCOMPLETE ═══════════════════════════ */
function AddressAutocomplete({ value, onChange, placeholder }) {
  const [inputVal, setInputVal]       = useState(value || "");
  const [suggestions, setSuggestions] = useState([]);
  const [showDrop, setShowDrop]       = useState(false);
  const [loading, setLoading]         = useState(false);
  const [confirmed, setConfirmed]     = useState(!!value);
  const [highlighted, setHighlighted] = useState(-1);
  const debounceRef = useRef(null);
  const abortRef    = useRef(null);

  useEffect(() => { setInputVal(value || ""); }, [value]);

  function buildLabel(r) {
    const a = r.address || {};
    const parts = [];
    const houseNum = a.house_number || "";
    const road     = a.road || a.pedestrian || a.footway || a.path || "";
    if (road) parts.push(houseNum ? `${houseNum} ${road}` : road);
    const city = a.city || a.town || a.village || a.hamlet || a.suburb || a.neighbourhood || "";
    if (city) parts.push(city);
    const state = a.state || a.province || a.region || "";
    const zip   = a.postcode || "";
    if (state && zip) parts.push(`${state} ${zip}`);
    else if (state)   parts.push(state);
    const country = a.country_code ? a.country_code.toUpperCase() : "";
    if (country && country !== "US") parts.push(a.country || country);
    return parts.length > 0 ? parts.join(", ") : r.display_name;
  }

  function buildMain(r) {
    const a = r.address || {};
    const houseNum = a.house_number || "";
    const road     = a.road || a.pedestrian || a.footway || "";
    if (road) return houseNum ? `${houseNum} ${road}` : road;
    return a.city || a.town || a.village || a.hamlet || r.display_name.split(",")[0];
  }

  function buildSub(r) {
    const a = r.address || {};
    const city    = a.city || a.town || a.village || a.hamlet || "";
    const state   = a.state || a.province || "";
    const zip     = a.postcode || "";
    const country = a.country_code ? a.country_code.toUpperCase() : "";
    const road = a.road || a.pedestrian || "";
    const subParts = [];
    if (road && city) subParts.push(city);
    if (state)        subParts.push(zip ? `${state} ${zip}` : state);
    if (country && country !== "US") subParts.push(a.country || country);
    return subParts.join(", ");
  }

  function handleInput(e) {
    const v = e.target.value;
    setInputVal(v);
    setConfirmed(false);
    setHighlighted(-1);
    onChange(v);
    clearTimeout(debounceRef.current);
    if (v.trim().length < 3) { setSuggestions([]); setShowDrop(false); return; }
    debounceRef.current = setTimeout(async () => {
      if (abortRef.current) abortRef.current.abort();
      abortRef.current = new AbortController();
      setLoading(true);
      try {
        const looksLikeStreet = /^\d+\s+\w/.test(v.trim());
        const url = looksLikeStreet
          ? `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(v)}&format=json&addressdetails=1&limit=7`
          : `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(v)}&format=json&addressdetails=1&limit=7&countrycodes=us,ca,jp,ch,au,nz,at,fr,de,gb,ar,cl`;
        const res = await fetch(url, {
          signal: abortRef.current.signal,
          headers: { "Accept-Language": "en", "User-Agent": "SkiDayBriefingApp/1.0" }
        });
        const data = await res.json();
        const seen = new Set();
        const mapped = [];
        for (const r of data) {
          const label = buildLabel(r);
          if (!seen.has(label)) { seen.add(label); mapped.push({ label, main: buildMain(r), sub: buildSub(r) }); }
        }
        setSuggestions(mapped);
        setShowDrop(true);
      } catch (err) {
        if (err.name !== "AbortError") setSuggestions([]);
      } finally { setLoading(false); }
    }, 300);
  }

  function pick(s) {
    setInputVal(s.label);
    setConfirmed(true);
    setSuggestions([]);
    setShowDrop(false);
    onChange(s.label);
  }

  function handleKeyDown(e) {
    if (!showDrop || !suggestions.length) return;
    if (e.key === "ArrowDown") { e.preventDefault(); setHighlighted(h => Math.min(h + 1, suggestions.length - 1)); }
    if (e.key === "ArrowUp")   { e.preventDefault(); setHighlighted(h => Math.max(h - 1, 0)); }
    if (e.key === "Enter" && highlighted >= 0) { e.preventDefault(); pick(suggestions[highlighted]); }
    if (e.key === "Escape") { setShowDrop(false); setHighlighted(-1); }
  }

  return (
    <div className="addr-wrap">
      <input
        className="field-input" type="text" value={inputVal}
        onChange={handleInput} onKeyDown={handleKeyDown}
        onFocus={() => suggestions.length > 0 && setShowDrop(true)}
        onBlur={() => setTimeout(() => setShowDrop(false), 180)}
        placeholder={placeholder} autoComplete="off" style={{ paddingRight: 30 }}
      />
      {loading   && <i className="ti ti-loader-2 spin addr-spinner" />}
      {confirmed && !loading && <i className="ti ti-check addr-confirmed" />}
      {showDrop && suggestions.length > 0 && (
        <div className="addr-dropdown">
          {suggestions.map((s, i) => (
            <div key={i} className={`addr-item${highlighted === i ? " highlighted" : ""}`}
              onMouseDown={() => pick(s)} onMouseEnter={() => setHighlighted(i)}>
              <i className="ti ti-map-pin addr-item-icon" />
              <div>
                <div className="addr-item-main">{s.main}</div>
                {s.sub && <div className="addr-item-sub">{s.sub}</div>}
              </div>
            </div>
          ))}
          <div style={{ padding: "6px 13px 7px", fontSize: 10, color: "rgba(255,255,255,0.18)", textAlign: "right" }}>
            © OpenStreetMap contributors
          </div>
        </div>
      )}
    </div>
  );
}

  }
  if (section === "parking" && isPalisades) {
    links.push(<QuickLink key="map" href="https://www.parkpalisadestahoe.com/mapnpark" icon="ti-parking" label="Map N Park" />);
    links.push(<QuickLink key="res" href="https://reservenski.parkpalisadestahoe.com/" icon="ti-calendar-plus" label="Reserve" />);
    links.push(<QuickLink key="mtn" href="https://www.mountaineertransit.org/" icon="ti-bus" label="Mountaineer" />);
  }
  if (section === "weather" && resort && resort.opensnow) {
    links.push(<QuickLink key="os" href={`https://opensnow.com/dailysnow/${resort.opensnow}`} icon="ti-snowflake" label="OpenSnow" />);
  }
  if (section === "field" && resort && resort.unofficialAlpine) {
    links.push(<QuickLink key="ua" href="https://unofficialalpine.com/" icon="ti-external-link" label="Unofficial Alpine" variant="green" />);
  }

  return (
    <div className="section-card">
      <div className="card-header">
        <div className="card-label-group">
          <div className="card-icon" style={{ background: meta.accent + "18" }}>
            <i className={`ti ${meta.icon}`} style={{ fontSize: 15, color: meta.accent }} />
          </div>
          <span className="card-title" style={{ color: meta.accent }}>{meta.label}</span>
        </div>
        {links.length > 0 && <div className="card-links">{links}</div>}
      </div>
      {loading ? (
        <div className="pulse-row">
          <div className="pulse-dot" style={{ background: meta.accent }} />
          <div className="pulse-dot" style={{ background: meta.accent }} />
          <div className="pulse-dot" style={{ background: meta.accent }} />
          <span className="pulse-label">Fetching live data…</span>
        </div>
      ) : (
        <div className={`card-body${!content ? " card-body-empty" : ""}`}>
          {content || "No data retrieved"}
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════ PARTY TAB ═══════════════════════════ */
function PartyTab({ resort }) {
  const [party, setParty]       = useState(() => readPartyFromURL());
  const [myName, setMyName]     = useState(() => localStorage.getItem('skiMyName') || '');
  const [joinName, setJoinName] = useState('');
  const [partyName, setPartyName] = useState(() => resort ? `${resort.name.split(' ')[0]} Crew` : 'Ski Crew');
  const [partyResort, setPartyResort] = useState(() => resort ? resort.name : '');
  const [partyDate, setPartyDate]     = useState(new Date().toISOString().slice(0, 10));
  const [copied, setCopied]     = useState(false);

  useEffect(() => {
    if (resort && !party) {
      setPartyName(`${resort.name.split(' ')[0]} Crew`);
      setPartyResort(resort.name);
    }
  }, [resort]);

  function createParty() {
    const name = myName.trim();
    if (!name || !partyName.trim()) return;
    localStorage.setItem('skiMyName', name);
    const newParty = {
      n: partyName.trim(),
      r: partyResort || (resort && resort.name) || '',
      d: partyDate,
      m: [{ n: name, s: null, t: new Date().toISOString() }],
    };
    setParty(newParty);
    writePartyToURL(newParty);
  }

  function updateStatus(statusCode) {
    const name = myName.trim();
    if (!party || !name) return;
    localStorage.setItem('skiMyName', name);
    const updated = { ...party };
    const idx = updated.m.findIndex(m => m.n === name);
    const member = { n: name, s: statusCode, t: new Date().toISOString() };
    if (idx >= 0) updated.m = updated.m.map((m, i) => i === idx ? member : m);
    else updated.m = [...updated.m, member];
    setParty(updated);
    writePartyToURL(updated);
  }

  function joinParty() {
    const name = joinName.trim() || myName.trim();
    if (!party || !name) return;
    localStorage.setItem('skiMyName', name);
    setMyName(name);
    setJoinName('');
    if (party.m.some(m => m.n === name)) return;
    const updated = { ...party, m: [...party.m, { n: name, s: null, t: new Date().toISOString() }] };
    setParty(updated);
    writePartyToURL(updated);
  }

  async function shareParty() {
    const url = writePartyToURL(party);
    const shareData = { title: `${party.n} · Ski Party`, text: `Track our ski day at ${party.r}!`, url };
    if (navigator.share) {
      try { await navigator.share(shareData); return; } catch {}
    }
    try { await navigator.clipboard.writeText(url); } catch {}
    setCopied(true);
    setTimeout(() => setCopied(false), 2500);
  }

  function leaveParty() {
    setParty(null);
    writePartyToURL(null);
  }

  const myMember  = party && myName ? party.m.find(m => m.n === myName.trim()) : null;
  const imInParty = !!myMember;
  const isPartyFull = party && party.m.some(m => m.s === 'full');
  const dateLabel = party
    ? new Date(party.d + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' })
    : '';

  if (!party) {
    return (
      <div className="party-root">
        <div className="party-hero">
          <div className="party-hero-eyebrow">Coordinate your crew</div>
          <div className="party-hero-title">🎿 Ski Party</div>
          <div className="party-hero-sub">Create a party link — share via iMessage, anyone can update their status</div>
        </div>
        <div className="party-create">
          <div className="party-section-title">Your info</div>
          <div className="party-form" style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            <div className="field-group">
              <span className="field-label">Your name</span>
              <input className="field-input" value={myName} onChange={e => setMyName(e.target.value)} placeholder="e.g. Adam" autoCapitalize="words" />
            </div>
            <div className="party-section-title" style={{ marginTop: 6 }}>Party details</div>
            <div className="field-group">
              <span className="field-label">Party name</span>
              <input className="field-input" value={partyName} onChange={e => setPartyName(e.target.value)} placeholder="e.g. Tahoe Crew" autoCapitalize="words" />
            </div>
            <div className="party-row">
              <div className="field-group" style={{ flex: 2 }}>
                <span className="field-label">Resort</span>
                <input className="field-input" value={partyResort} onChange={e => setPartyResort(e.target.value)} placeholder="Resort name" />
              </div>
              <div className="field-group" style={{ flex: 1 }}>
                <span className="field-label">Date</span>
                <input className="field-input" type="date" value={partyDate} onChange={e => setPartyDate(e.target.value)} />
              </div>
            </div>
            <button className="create-btn" onClick={createParty} disabled={!myName.trim() || !partyName.trim()}>
              <i className="ti ti-users" style={{ fontSize: 15 }} />
              Create Party & Get Link
            </button>
          </div>
          <div className="create-hint">
            Already have a party link? Just open it to join.
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="party-root">
      <div className="party-hero">
        <div className="party-hero-eyebrow">{party.r}{party.r && ' · '}{dateLabel}</div>
        <div className="party-hero-title">🎿 {party.n}</div>
        <div className="party-hero-sub">{party.m.length} member{party.m.length !== 1 ? 's' : ''} · Share link to add your crew</div>
      </div>

      <div className="party-card">
        {isPartyFull && (
          <div className="party-full-banner">
            <span style={{ fontSize: 18 }}>🎉</span>
            <span>Party is full — no more room!</span>
          </div>
        )}

        <div className="party-card-header">
          <div className="party-card-name">{party.n}</div>
          <div className="party-card-meta">
            <span>{party.r}</span>
            {party.r && <span>·</span>}
            <span>{dateLabel}</span>
          </div>
        </div>

        <div className="member-list">
          {party.m.length === 0 ? (
            <div className="member-empty">No members yet — share the link!</div>
          ) : (
            party.m.map((m, i) => {
              const statusInfo = STATUSES.find(s => s.code === m.s);
              const isMe = myName && m.n === myName.trim();
              return (
                <div key={i} className="member-row">
                  <div className="member-emoji">{statusInfo ? statusInfo.emoji : '👤'}</div>
                  <div className="member-info">
                    <div className="member-name-row">
                      {m.n}
                      {isMe && <span className="member-you">you</span>}
                    </div>
                    <div className="member-status-text">
                      {statusInfo ? statusInfo.label : 'No status yet'}
                    </div>
                  </div>
                  {m.s && <div className="member-time">{formatTime(m.t)}</div>}
                </div>
              );
            })
          )}
        </div>

        {!imInParty && (
          <div className="join-section">
            <div className="field-group">
              <span className="field-label">Your name to join</span>
              <input
                className="field-input"
                value={joinName || myName}
                onChange={e => setJoinName(e.target.value)}
                placeholder="Enter your name"
                autoCapitalize="words"
              />
            </div>
            <button className="cta-btn" style={{ padding: '9px 16px', fontSize: 13, alignSelf: 'flex-end' }} onClick={joinParty}>
              Join
            </button>
          </div>
        )}

        {imInParty && (
          <div className="your-status-section">
            <div className="your-status-label">Your status</div>
            <div className="status-grid">
              {STATUSES.map(s => {
                const isSelected = myMember && myMember.s === s.code;
                const isFull = s.code === 'full';
                return (
                  <button
                    key={s.code}
                    className={`status-btn${isSelected ? (isFull ? ' selected-full' : ' selected') : ''}`}
                    onClick={() => updateStatus(s.code)}
                  >
                    <span className="status-emoji">{s.emoji}</span>
                    <span className="status-label">{s.label}</span>
                  </button>
                );
              })}
            </div>
          </div>
        )}

        <div className="party-actions">
          <button className={`share-btn${copied ? ' copied' : ''}`} onClick={shareParty}>
            <i className={`ti ${copied ? 'ti-check' : 'ti-share'}`} style={{ fontSize: 14 }} />
            {copied ? 'Link copied!' : 'Share party link'}
          </button>
          <button className="leave-btn" onClick={leaveParty}>Leave this party</button>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════ APP ═══════════════════════════ */
function App() {
  const hasPartyInUrl = new URLSearchParams(window.location.search).has('party');
  const [activeTab, setActiveTab] = useState(hasPartyInUrl ? 'party' : 'briefing');

  const [query, setQuery]       = useState("");
  const [resort, setResort]     = useState(null);
  const [showDrop, setShowDrop] = useState(false);
  const [origin, setOrigin]     = useState("San Francisco, CA");
  const [date, setDate]         = useState(new Date().toISOString().slice(0, 10));
  const [loading, setLoading]   = useState(false);
  const [result, setResult]     = useState(null);
  const [error, setError]       = useState(null);
  const [heroLoaded, setHeroLoaded] = useState(false);
  const [notifGranted, setNotifGranted] = useState(
    typeof Notification !== 'undefined' && Notification.permission === 'granted'
  );
  const [reminderSet, setReminderSet] = useState(false);
  const [toast, setToast] = useState(null);
  const toastRef = useRef(null);

  const filtered = useMemo(() => {
    if (!query.trim()) return [];
    const q = query.toLowerCase();
    return IKON_RESORTS.filter(r =>
      r.name.toLowerCase().includes(q) || r.state.toLowerCase().includes(q) || r.region.toLowerCase().includes(q)
    ).slice(0, 8);
  }, [query]);

  useEffect(() => { setHeroLoaded(false); }, [resort]);

  const today     = new Date(date + "T12:00:00");
  const dateLabel = today.toLocaleDateString("en-US", { weekday:"long", month:"long", day:"numeric", year:"numeric" });
  const dayOfWeek = today.toLocaleDateString("en-US", { weekday:"long" });
  const isWeekend = ["Saturday","Sunday"].includes(dayOfWeek);
  const isTahoe   = resort && ["Palisades Tahoe","Alpine Meadows","Sierra-at-Tahoe"].includes(resort.name);

  function pickResort(r) {
    setResort(r); setQuery(""); setShowDrop(false); setResult(null); setError(null);
  }

  function showToast(msg, duration = 2800) {
    if (toastRef.current) clearTimeout(toastRef.current);
    setToast(msg);
    toastRef.current = setTimeout(() => setToast(null), duration);
  }

  async function requestNotifications() {
    if (!('Notification' in window)) { showToast('Notifications not supported in this browser'); return; }
    const permission = await Notification.requestPermission();
    if (permission === 'granted') {
      setNotifGranted(true);
      const reminderDate = new Date(date + 'T06:30:00');
      const delay = reminderDate.getTime() - Date.now();
      if (resort && delay > 0) {
        setTimeout(() => {
          new Notification(`☀️ Ski day at ${resort.name}!`, {
            body: 'Tap to get your AI-powered briefing.',
            icon: '/icon.svg',
          });
        }, delay);
        setReminderSet(true);
        showToast(`🔔 Reminder set for ${reminderDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })} at 6:30 AM`);
      } else {
        showToast('🔔 Notifications enabled');
      }
    }
  }

  async function fetchBriefing() {
    if (!resort) return;
    setLoading(true); setError(null); setResult(null);

    const avalancheSource = resort.avalanche !== "N/A"
      ? `Sierra Avalanche Center at https://www.sierraavalanchecenter.org/`
      : `regional avalanche center for ${resort.name}`;

    const placerNote = isTahoe
      ? `Also search for public Placer County Sheriff alerts and Caltrans chain control on ${resort.highways.join(", ")}.`
      : `Check chain control/incidents on ${resort.highways.join(", ")}.`;

    const parkingBlock = resort.parking
      ? `5. PARKING & MOUNTAINEER: Search parkpalisadestahoe.com for lot availability. Today is ${dayOfWeek}. ${isWeekend ? "Weekend: reservations required." : "Weekday: no reservation needed, first-come first-served."} Mountaineer wait estimate: avg <15 min low demand; 30+ min weekends/powder days 8-10am & 3-6pm.`
      : `5. PARKING: General parking info/tips for ${resort.name}.`;

    const uaBlock = resort.unofficialAlpine
      ? `1. FIELD REPORT: Fetch https://unofficialalpine.com/ and summarize the most recent post about conditions at Alpine Meadows or Palisades Tahoe — key observations about snow quality, terrain, and any warnings. 3-4 sentences.`
      : `1. FIELD REPORT: Search for the most recent community or blogger conditions report for ${resort.name} from this week.`;

    const prompt = `You are a ski day prep assistant. Today is ${dateLabel} (${dayOfWeek}). The skier is driving from ${origin} to ${resort.name} (${resort.state}, ${resort.elevation.toLocaleString()} ft).

Compile a complete ski day briefing:

${uaBlock}

2. ROAD & TRAFFIC: Caltrans QuickMap https://quickmap.dot.ca.gov/ and Google Maps on ${resort.highways.join(", ")} between ${origin} and ${resort.name}. Drive time, closures, chain control. ${placerNote}

3. LIFTS: ${resort.url} — open and closed lifts.

4. TRAILS: Same — open run counts by difficulty (green/blue/black/double-black).

${parkingBlock}

6. AVALANCHE: ${avalancheSource} — danger rating 1-5, hazard type, terrain to avoid.

7. WEATHER: Temp, wind, precipitation, visibility for ${resort.name} today. Then specific gear list.

8. GAME PLAN: 4-5 bullet point action items — departure time, parking strategy, best zones, timing, go/no-go.

Use EXACTLY these section headers (with colon):
FIELD REPORT:
ROAD:
LIFTS:
TRAILS:
PARKING:
AVALANCHE:
WEATHER:
GAME PLAN:`;

    try {
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-5",
          max_tokens: 1800,
          tools: [{ type: "web_search_20250305", name: "web_search" }],
          messages: [{ role: "user", content: prompt }],
        }),
      });
      if (!res.ok) { const e = await res.json(); throw new Error(e.error?.message || "API error"); }
      const data = await res.json();
      const text = data.content.filter(b => b.type === "text").map(b => b.text).join("\n");
      const parsed = {};
      for (const k of SECTIONS) parsed[k] = parseSection(text, k);
      setResult(parsed);
    } catch(e) { setError(e.message); }
    finally { setLoading(false); }
  }

  const heroImg = (resort && resort.img) || "https://images.unsplash.com/photo-1551698618-1dfe5d97d256?w=1200&q=80";

  return (
    <div className="ski-root">
      {activeTab === 'briefing' && (
        <>
          <div className="hero">
            <img className="hero-img" src={heroImg} alt="" onLoad={() => setHeroLoaded(true)} style={{ opacity: heroLoaded ? 1 : 0 }} />
            <div className="hero-overlay" />
            <div className="hero-content">
              <div className="hero-eyebrow">
                {resort ? `${resort.region} · ${resort.elevation.toLocaleString()} ft · Ikon Pass` : "Ikon Pass · Ski Day Briefing"}
                {resort && resort.opensnow && (
                  <a href={`https://opensnow.com/dailysnow/${resort.opensnow}`} target="_blank" rel="noopener noreferrer" className="hero-os-badge">
                    <i className="ti ti-snowflake" style={{ fontSize: 9 }} /> OpenSnow
                  </a>
                )}
              </div>
              <div className="hero-title">
                {resort ? resort.name : "Where are\nyou skiing?"}
              </div>
              <div className="hero-sub">
                {resort
                  ? `${resort.state} · ${resort.highways.join(" · ")} · ${dateLabel}`
                  : "Live conditions · road alerts · avalanche · gear · game plan"}
              </div>
            </div>
          </div>

          <div className="controls">
            <div className="field-group" style={{ flex: 2, minWidth: 180, position: "relative" }}>
              <span className="field-label">Resort</span>
              {resort ? (
                <div className="resort-badge">
                  <i className="ti ti-map-pin" style={{ fontSize: 12 }} />
                  {resort.name}
                  <span className="resort-badge-state">{resort.state}</span>
                  <button className="resort-badge-remove" onClick={() => { setResort(null); setResult(null); }}>×</button>
                </div>
              ) : (
                <div className="dropdown-wrap">
                  <input className="field-input" type="text" placeholder="Search resorts…" value={query}
                    onChange={e => { setQuery(e.target.value); setShowDrop(true); }}
                    onFocus={() => setShowDrop(true)}
                    onBlur={() => setTimeout(() => setShowDrop(false), 160)} />
                  {showDrop && filtered.length > 0 && (
                    <div className="dropdown">
                      {filtered.map(r => (
                        <div key={r.name} className="dropdown-item" onMouseDown={() => pickResort(r)}>
                          <span>{r.name}</span>
                          <div className="dropdown-tags">
                            {r.unofficialAlpine && <span className="tag tag-ua">UA</span>}
                            {r.opensnow && <span className="tag tag-os">OS</span>}
                            <span className="tag tag-st">{r.state}</span>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                  {showDrop && query.length > 1 && filtered.length === 0 && (
                    <div className="dropdown"><div className="dropdown-empty">No Ikon resorts matching "{query}"</div></div>
                  )}
                </div>
              )}
            </div>

            <div className="field-group" style={{ flex: 2, minWidth: 150 }}>
              <span className="field-label">Driving from</span>
              <AddressAutocomplete value={origin} onChange={setOrigin} placeholder="Start typing your city or address…" />
            </div>

            <div className="field-group" style={{ flex: 1, minWidth: 130 }}>
              <span className="field-label">Date</span>
              <input className="field-input" type="date" value={date} onChange={e => setDate(e.target.value)} />
            </div>

            <button className="cta-btn" onClick={fetchBriefing} disabled={loading || !resort}>
              {loading
                ? <><i className="ti ti-loader-2 spin" style={{ fontSize: 14 }} />Loading…</>
                : <><i className="ti ti-refresh" style={{ fontSize: 14 }} />Get briefing</>}
            </button>
          </div>

          {resort && <OpenSnowPanel resort={resort} />}
          {resort && <TrafficPanel resort={resort} />}

          {resort && !notifGranted && (
            <div className="notif-bar">
              <i className="ti ti-bell" style={{ fontSize: 14 }} />
              <span>Get a 6:30 AM reminder on your ski day</span>
              <button className="notif-bar-btn" onClick={requestNotifications}>Enable</button>
            </div>
          )}
          {resort && notifGranted && reminderSet && (
            <div className="notif-bar confirmed">
              <i className="ti ti-bell-check" style={{ fontSize: 14 }} />
              <span>Reminder set for {new Date(date + 'T06:30:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' })} at 6:30 AM</span>
            </div>
          )}

          {resort && (
            <div className="quick-links">
              {resort.opensnow && <QuickLink href={`https://opensnow.com/dailysnow/${resort.opensnow}`} icon="ti-snowflake" label="OpenSnow daily forecast" variant="cyan" />}
              {resort.unofficialAlpine && <QuickLink href="https://unofficialalpine.com/" icon="ti-pencil" label="Unofficial Alpine" variant="green" />}
              {resort.parking && <QuickLink href="https://www.parkpalisadestahoe.com/mapnpark" icon="ti-parking" label="Map N Park" variant="cyan" />}
              {isTahoe && <QuickLink href="https://member.everbridge.net/453003085611269/login" icon="ti-shield-check" label="Placer County alerts" variant="orange" />}
              <QuickLink href={resort.url} icon="ti-mountain" label="Mountain report" variant="amber" />
            </div>
          )}

          {isTahoe && (
            <div className="tahoe-notice">
              <i className="ti ti-alert-triangle" style={{ fontSize: 14, flexShrink: 0, marginTop: 1 }} />
              <span>
                Tahoe resort — briefing includes Placer County Sheriff alerts, Caltrans I-80/SR-89 chain control, Reserve N Ski parking status, and Mountaineer wait estimate.
                For live push alerts, <a href="https://member.everbridge.net/453003085611269/login" target="_blank" rel="noopener noreferrer">log in to Everbridge ↗</a>
              </span>
            </div>
          )}

          {error && (
            <div className="error-bar">
              <i className="ti ti-alert-circle" style={{ fontSize: 14 }} />
              {error}. Make sure you're connected and try again.
            </div>
          )}

          {result && (
            <div className="result-header appear">
              <div className="result-pill">
                <i className="ti ti-check" style={{ fontSize: 11 }} />
                Live briefing · {resort && resort.name} · {dateLabel}
              </div>
            </div>
          )}

          {(loading || result) && (
            <div className="cards appear">
              {SECTIONS.map(s => (
                <SectionCard key={s} section={s} content={result && result[s]} loading={loading && !result} resort={resort} />
              ))}
            </div>
          )}

          {!loading && !result && !error && (
            <div className="empty">
              <i className="ti ti-mountain empty-icon" />
              <div className="empty-text">
                Search for an Ikon Pass resort above,<br />set your departure city and date, then hit Get Briefing.
              </div>
            </div>
          )}
        </>
      )}

      {activeTab === 'party' && <PartyTab resort={resort} />}

      <BottomNav activeTab={activeTab} setActiveTab={setActiveTab} hasParty={hasPartyInUrl} />

      {toast && (
        <div className="toast">
          <i className="ti ti-check" style={{ fontSize: 13, color: '#A8FF78' }} />
          {toast}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
