<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { min-height: 100vh; background: #0a0e14; }
  body { font-family: 'Barlow', sans-serif; color: #e8edf2; }

  .ski-root { background: #0a0e14; min-height: 100vh; width: 100%; max-width: 960px; margin: 0 auto; }

  /* Hero */
  .hero { position: relative; height: 320px; overflow: hidden; display: flex; align-items: flex-end; }
  .hero-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; filter: brightness(0.42) saturate(1.15); transition: opacity 0.9s ease; }
  .hero-overlay { position: absolute; inset: 0; background: linear-gradient(to top, #0a0e14 0%, rgba(10,14,20,0.3) 60%, transparent 100%); }
  .hero-content { position: relative; padding: 0 28px 32px; width: 100%; }
  .hero-eyebrow { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; color: #00BFFF; margin-bottom: 8px; }
  .hero-title { font-family: 'Barlow Condensed', sans-serif; font-size: 52px; font-weight: 800; line-height: 0.95; text-transform: uppercase; color: #fff; margin: 0 0 6px; }
  .hero-sub { font-size: 13px; font-weight: 300; color: rgba(255,255,255,0.55); }

  /* Controls */
  .controls { background: #111620; border-bottom: 1px solid rgba(255,255,255,0.07); padding: 18px 28px; display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
  .field-group { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 140px; }
  .field-label { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; color: rgba(255,255,255,0.38); }
  .field-input { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 4px; color: #e8edf2; font-family: 'Barlow', sans-serif; font-size: 13px; padding: 9px 12px; outline: none; width: 100%; transition: border-color 0.2s; }
  .field-input:focus { border-color: #00BFFF; }
  .field-input::placeholder { color: rgba(255,255,255,0.22); }
  .field-input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.6); cursor: pointer; }

  /* Resort badge */
  .resort-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(0,191,255,0.12); border: 1px solid rgba(0,191,255,0.35); border-radius: 4px; padding: 8px 12px; font-size: 13px; color: #00BFFF; font-weight: 500; cursor: default; }
  .resort-badge-state { opacity: 0.5; font-size: 11px; }
  .resort-badge-remove { background: none; border: none; cursor: pointer; color: rgba(0,191,255,0.55); font-size: 17px; line-height: 1; padding: 0; margin-left: 2px; transition: color 0.15s; }
  .resort-badge-remove:hover { color: #00BFFF; }

  /* Dropdown */
  .dropdown-wrap { position: relative; }
  .dropdown { position: absolute; top: calc(100% + 5px); left: 0; right: 0; z-index: 300; background: #1a2030; border: 1px solid rgba(255,255,255,0.13); border-radius: 6px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.7); }
  .dropdown-item { padding: 11px 14px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; color: #c8d4e0; transition: background 0.1s; }
  .dropdown-item:last-child { border-bottom: none; }
  .dropdown-item:hover { background: rgba(0,191,255,0.09); }
  .dropdown-tags { display: flex; gap: 5px; align-items: center; }
  .tag { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 3px; letter-spacing: 0.06em; }
  .tag-os { background: rgba(0,191,255,0.14); color: #00BFFF; border: 1px solid rgba(0,191,255,0.28); }
  .tag-ua { background: rgba(168,255,120,0.12); color: #A8FF78; border: 1px solid rgba(168,255,120,0.28); }
  .tag-st { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.42); border: 1px solid rgba(255,255,255,0.1); }
  .dropdown-empty { padding: 13px 14px; color: rgba(255,255,255,0.28); font-size: 13px; }

  /* CTA */
  .cta-btn { background: #00BFFF; border: none; border-radius: 4px; color: #0a0e14; font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 0.09em; text-transform: uppercase; padding: 11px 24px; cursor: pointer; display: flex; align-items: center; gap: 7px; white-space: nowrap; transition: background 0.18s, opacity 0.18s; align-self: flex-end; }
  .cta-btn:hover:not(:disabled) { background: #33CCFF; }
  .cta-btn:disabled { opacity: 0.38; cursor: not-allowed; }

  /* Quick links */
  .quick-links { padding: 11px 28px; display: flex; gap: 8px; flex-wrap: wrap; border-bottom: 1px solid rgba(255,255,255,0.05); background: #0d1118; }

  .card-label-group { display: flex; align-items: center; gap: 9px; }

  .card-links { display: flex; gap: 6px; flex-wrap: wrap; }

  .card-body-empty { color: rgba(255,255,255,0.18); font-style: italic; }

  .pulse-row { display: flex; gap: 5px; align-items: center; padding: 13px 18px 17px; }

  .addr-spinner   { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 13px; color: rgba(0,191,255,0.5); }
  .addr-confirmed { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 13px; color: #A8FF78; }

  /* Animations */

  .spin { animation: spin-anim 0.8s linear infinite; display: inline-block; }
  @keyframes fade-up { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
  .appear { animation: fade-up 0.38s ease both; }

};

const SECTION_MARKERS = {
  field:     ["FIELD REPORT:","UNOFFICIAL ALPINE:","COMMUNITY REPORT:","ON-MOUNTAIN REPORT:"],
  road:      ["ROAD:","ROAD ALERTS:","TRAFFIC:","ROAD & TRAFFIC:"],
  parking:   ["PARKING:","PARKING & MOUNTAINEER:","PARKING & SHUTTLE:"],
  lifts:     ["LIFTS:","LIFT REPORT:","LIFTS OPEN:"],
  trails:    ["TRAILS:","TRAIL REPORT:","RUNS:"],
  avalanche: ["AVALANCHE:","AVALANCHE FORECAST:","AVALANCHE DANGER:"],
  weather:   ["WEATHER:","WEATHER FORECAST:","GEAR:"],
  summary:   ["GAME PLAN:","SUMMARY:","BOTTOM LINE:"],
};

function parseSection(text, key) {
  const keys = SECTION_MARKERS[key];
  const otherKeys = Object.entries(SECTION_MARKERS).filter(([k]) => k !== key).flatMap(([,v]) => v);
  const lines = text.split("\n");
  let capturing = false, result = [];
  for (const line of lines) {
    const upper = line.trim().toUpperCase();
    if (!capturing && keys.some(k => upper.startsWith(k))) {
      capturing = true;
      const after = line.slice(line.indexOf(":") + 1).trim();
      if (after) result.push(after);
      continue;
    }
    if (capturing) {
      if (otherKeys.some(k => upper.startsWith(k))) break;
      result.push(line);
    }
  }
  return result.join("\n").trim();
}

// ── Address autocomplete using Nominatim (OpenStreetMap, free, no key) ──────

  const abortRef    = React.useRef(null);

  useEffect(() => { setInputVal(value || ""); }, [value]);

  // Build a clean human-readable label from a Nominatim result
  function buildLabel(r) {
    const a = r.address || {};
    const parts = [];

    // Street address line
    const houseNum = a.house_number || "";
    const road     = a.road || a.pedestrian || a.footway || a.path || "";
    if (road) parts.push(houseNum ? `${houseNum} ${road}` : road);

    // City / locality
    const city = a.city || a.town || a.village || a.hamlet || a.suburb || a.neighbourhood || "";
    if (city) parts.push(city);

    // State + zip
    const state = a.state || a.province || a.region || "";
    const zip   = a.postcode || "";
    if (state && zip) parts.push(`${state} ${zip}`);
    else if (state)   parts.push(state);

    // Country (only for non-US)
    const country = a.country_code ? a.country_code.toUpperCase() : "";
    if (country && country !== "US") parts.push(a.country || country);

    return parts.length > 0 ? parts.join(", ") : r.display_name;
  }

  // The "main" line shown bold in the dropdown (street or city)
  function buildMain(r) {
    const a = r.address || {};
    const houseNum = a.house_number || "";
    const road     = a.road || a.pedestrian || a.footway || "";
    if (road) return houseNum ? `${houseNum} ${road}` : road;
    return a.city || a.town || a.village || a.hamlet || r.display_name.split(",")[0];
  }

  // The "sub" line shown muted beneath
  function buildSub(r) {
    const a = r.address || {};
    const city    = a.city || a.town || a.village || a.hamlet || "";
    const state   = a.state || a.province || "";
    const zip     = a.postcode || "";
    const country = a.country_code ? a.country_code.toUpperCase() : "";

    const road = a.road || a.pedestrian || "";
    // If main was already a road, include city in sub; otherwise just state
    const subParts = [];
    if (road && city) subParts.push(city);
    if (state)        subParts.push(zip ? `${state} ${zip}` : state);
    if (country && country !== "US") subParts.push(a.country || country);
    return subParts.join(", ");
  }

  function handleInput(e) {
    const v = e.target.value;
    setInputVal(v);
    setConfirmed(false);
    setHighlighted(-1);
    onChange(v);

    clearTimeout(debounceRef.current);
    if (v.trim().length < 3) { setSuggestions([]); setShowDrop(false); return; }

    debounceRef.current = setTimeout(async () => {
      if (abortRef.current) abortRef.current.abort();
      abortRef.current = new AbortController();
      setLoading(true);
      try {
        // Use structured search when input looks like it has a number (street address)
        const looksLikeStreet = /^\d+\s+\w/.test(v.trim());
        const url = looksLikeStreet
          ? `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(v)}&format=json&addressdetails=1&limit=7`
          : `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(v)}&format=json&addressdetails=1&limit=7&countrycodes=us,ca,jp,ch,au,nz,at,fr,de,gb,ar,cl`;

        const res = await fetch(url, {
          signal: abortRef.current.signal,
          headers: { "Accept-Language": "en", "User-Agent": "SkiDayBriefingApp/1.0" }
        });
        const data = await res.json();

        // Deduplicate by label
        const seen = new Set();
        const mapped = [];
        for (const r of data) {
          const label = buildLabel(r);
          if (!seen.has(label)) {
            seen.add(label);
            mapped.push({ label, main: buildMain(r), sub: buildSub(r) });
          }
        }
        setSuggestions(mapped);
        setShowDrop(true);
      } catch (err) {
        if (err.name !== "AbortError") setSuggestions([]);
      } finally { setLoading(false); }
    }, 300);
  }

  function pick(s) {
    setInputVal(s.label);
    setConfirmed(true);
    setSuggestions([]);
    setShowDrop(false);
    onChange(s.label);
  }

  function handleKeyDown(e) {
    if (!showDrop || !suggestions.length) return;
    if (e.key === "ArrowDown") { e.preventDefault(); setHighlighted(h => Math.min(h + 1, suggestions.length - 1)); }
    if (e.key === "ArrowUp")   { e.preventDefault(); setHighlighted(h => Math.max(h - 1, 0)); }
    if (e.key === "Enter" && highlighted >= 0) { e.preventDefault(); pick(suggestions[highlighted]); }
    if (e.key === "Escape") { setShowDrop(false); setHighlighted(-1); }
  }

  return (
    <div className="addr-wrap">
      <input
        className="field-input"
        type="text"
        value={inputVal}
        onChange={handleInput}
        onKeyDown={handleKeyDown}
        onFocus={() => suggestions.length > 0 && setShowDrop(true)}
        onBlur={() => setTimeout(() => setShowDrop(false), 180)}
        placeholder={placeholder}
        autoComplete="off"
        style={{ paddingRight: 30 }}
      />
      {loading   && <i className="ti ti-loader-2 spin addr-spinner" />}
      {confirmed && !loading && <i className="ti ti-check addr-confirmed" />}
      {showDrop && suggestions.length > 0 && (
        <div className="addr-dropdown">
          {suggestions.map((s, i) => (
            <div
              key={i}
              className={`addr-item${highlighted === i ? " highlighted" : ""}`}
              onMouseDown={() => pick(s)}
              onMouseEnter={() => setHighlighted(i)}
            >
              <i className="ti ti-map-pin addr-item-icon" />
              <div>
                <div className="addr-item-main">{s.main}</div>
                {s.sub && <div className="addr-item-sub">{s.sub}</div>}
              </div>
            </div>
          ))}
          <div style={{ padding: "6px 13px 7px", fontSize: 10, color: "rgba(255,255,255,0.18)", textAlign: "right" }}>
            © OpenStreetMap contributors
          </div>
        </div>
      )}
    </div>
  );
}

function QuickLink({ href, icon, label, variant = "cyan" }) {
  return (
    <a href={href} target="_blank" rel="noopener noreferrer" className={`ql-btn ql-${variant}`}>
      <i className={`ti ${icon}`} style={{ fontSize: 11 }} />
      {label}
    </a>
  );
}

function SectionCard({ section, content, loading, resort }) {
  const meta = SECTION_META[section];
  const isPalisades = resort && resort.parking != null;
  const isTahoe = resort && ["Palisades Tahoe","Alpine Meadows","Sierra-at-Tahoe"].includes(resort.name);

  const links = [];
  if (section === "road" && isTahoe) {
    links.push(<QuickLink key="eb" href="https://member.everbridge.net/453003085611269/login" icon="ti-shield-check" label="Placer County alerts" variant="orange" />);
    links.push(<QuickLink key="ct" href="https://quickmap.dot.ca.gov/" icon="ti-map-2" label="Caltrans QuickMap" variant="orange" />);
  }
  if (section === "parking" && isPalisades) {
    links.push(<QuickLink key="map" href="https://www.parkpalisadestahoe.com/mapnpark" icon="ti-parking" label="Map N Park" />);
    links.push(<QuickLink key="res" href="https://reservenski.parkpalisadestahoe.com/" icon="ti-calendar-plus" label="Reserve" />);
    links.push(<QuickLink key="mtn" href="https://www.mountaineertransit.org/" icon="ti-bus" label="Mountaineer" />);
  }
  if (section === "weather" && resort && resort.opensnow) {
    links.push(<QuickLink key="os" href={`https://opensnow.com/dailysnow/${resort.opensnow}`} icon="ti-snowflake" label="OpenSnow" />);
  }
  if (section === "field" && resort && resort.unofficialAlpine) {
    links.push(<QuickLink key="ua" href="https://unofficialalpine.com/" icon="ti-external-link" label="Unofficial Alpine" variant="green" />);
  }

  return (
    <div className="section-card">
      <div className="card-header">
        <div className="card-label-group">
          <div className="card-icon" style={{ background: meta.accent + "18" }}>
            <i className={`ti ${meta.icon}`} style={{ fontSize: 15, color: meta.accent }} />
          </div>
          <span className="card-title" style={{ color: meta.accent }}>{meta.label}</span>
        </div>
        {links.length > 0 && <div className="card-links">{links}</div>}
      </div>
      {loading ? (
        <div className="pulse-row">
          <div className="pulse-dot" style={{ background: meta.accent }} />
          <div className="pulse-dot" style={{ background: meta.accent }} />
          <div className="pulse-dot" style={{ background: meta.accent }} />
          <span className="pulse-label">Fetching live data…</span>
        </div>
      ) : (
        <div className={`card-body${!content ? " card-body-empty" : ""}`}>
          {content || "No data retrieved"}
        </div>
      )}
    </div>
  );
}

function App() {
  const [query, setQuery]       = useState("");
  const [resort, setResort]     = useState(null);
  const [showDrop, setShowDrop] = useState(false);
  const [origin, setOrigin]     = useState("San Francisco, CA");
  const [date, setDate]         = useState(new Date().toISOString().slice(0,10));
  const [loading, setLoading]   = useState(false);
  const [result, setResult]     = useState(null);
  const [error, setError]       = useState(null);
  const [heroLoaded, setHeroLoaded] = useState(false);

  const filtered = useMemo(() => {
    if (!query.trim()) return [];
    const q = query.toLowerCase();
    return IKON_RESORTS.filter(r =>
      r.name.toLowerCase().includes(q) || r.state.toLowerCase().includes(q) || r.region.toLowerCase().includes(q)
    ).slice(0, 8);
  }, [query]);

  useEffect(() => { setHeroLoaded(false); }, [resort]);

  const today     = new Date(date + "T12:00:00");
  const dateLabel = today.toLocaleDateString("en-US", { weekday:"long", month:"long", day:"numeric", year:"numeric" });
  const dayOfWeek = today.toLocaleDateString("en-US", { weekday:"long" });
  const isWeekend = ["Saturday","Sunday"].includes(dayOfWeek);
  const isTahoe   = resort && ["Palisades Tahoe","Alpine Meadows","Sierra-at-Tahoe"].includes(resort.name);

  function pickResort(r) {
    setResort(r); setQuery(""); setShowDrop(false); setResult(null); setError(null);
  }

  async function fetchBriefing() {
    if (!resort) return;
    setLoading(true); setError(null); setResult(null);

    const avalancheSource = resort.avalanche !== "N/A"
      ? `Sierra Avalanche Center at https://www.sierraavalanchecenter.org/`
      : `regional avalanche center for ${resort.name}`;

    const placerNote = isTahoe
      ? `Also search for public Placer County Sheriff alerts and Caltrans chain control on ${resort.highways.join(", ")}.`
      : `Check chain control/incidents on ${resort.highways.join(", ")}.`;

    const parkingBlock = resort.parking
      ? `5. PARKING & MOUNTAINEER: Search parkpalisadestahoe.com for lot availability. Today is ${dayOfWeek}. ${isWeekend ? "Weekend: reservations required." : "Weekday: no reservation needed, first-come first-served."} Mountaineer wait estimate: avg <15 min low demand; 30+ min weekends/powder days 8-10am & 3-6pm.`
      : `5. PARKING: General parking info/tips for ${resort.name}.`;

    const uaBlock = resort.unofficialAlpine
      ? `1. FIELD REPORT: Fetch https://unofficialalpine.com/ and summarize the most recent post about conditions at Alpine Meadows or Palisades Tahoe — key observations about snow quality, terrain, and any warnings. 3-4 sentences.`
      : `1. FIELD REPORT: Search for the most recent community or blogger conditions report for ${resort.name} from this week.`;

    const prompt = `You are a ski day prep assistant. Today is ${dateLabel} (${dayOfWeek}). The skier is driving from ${origin} to ${resort.name} (${resort.state}, ${resort.elevation.toLocaleString()} ft).

Compile a complete ski day briefing:

${uaBlock}

2. ROAD & TRAFFIC: Caltrans QuickMap https://quickmap.dot.ca.gov/ and Google Maps on ${resort.highways.join(", ")} between ${origin} and ${resort.name}. Drive time, closures, chain control. ${placerNote}

3. LIFTS: ${resort.url} — open and closed lifts.

4. TRAILS: Same — open run counts by difficulty (green/blue/black/double-black).

${parkingBlock}

6. AVALANCHE: ${avalancheSource} — danger rating 1-5, hazard type, terrain to avoid.

7. WEATHER: Temp, wind, precipitation, visibility for ${resort.name} today. Then specific gear list.

8. GAME PLAN: 4-5 bullet point action items — departure time, parking strategy, best zones, timing, go/no-go.

Use EXACTLY these section headers (with colon):
FIELD REPORT:
ROAD:
LIFTS:
TRAILS:
PARKING:
AVALANCHE:
WEATHER:
GAME PLAN:`;

    try {
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1800,
          tools: [{ type: "web_search_20250305", name: "web_search" }],
          messages: [{ role: "user", content: prompt }],
        }),
      });
      if (!res.ok) { const e = await res.json(); throw new Error(e.error?.message || "API error"); }
      const data = await res.json();
      const text = data.content.filter(b => b.type === "text").map(b => b.text).join("\n");
      const parsed = {};
      for (const k of SECTIONS) parsed[k] = parseSection(text, k);
      setResult(parsed);
    } catch(e) { setError(e.message); }
    finally { setLoading(false); }
  }

  const heroImg = (resort && resort.img) || "https://images.unsplash.com/photo-1551698618-1dfe5d97d256?w=1200&q=80";

  return (
    <div className="ski-root">
      <div className="hero">
        <img className="hero-img" src={heroImg} alt="" onLoad={() => setHeroLoaded(true)} style={{ opacity: heroLoaded ? 1 : 0 }} />
        <div className="hero-overlay" />
        <div className="hero-content">
          <div className="hero-eyebrow">
            {resort ? `${resort.region} · ${resort.elevation.toLocaleString()} ft · Ikon Pass` : "Ikon Pass · Ski Day Briefing"}
          </div>
          <div className="hero-title">
            {resort ? resort.name : "Where are\nyou skiing?"}
          </div>
          <div className="hero-sub">
            {resort
              ? `${resort.state} · ${resort.highways.join(" · ")} · ${dateLabel}`
              : "Live conditions · road alerts · avalanche · gear · game plan"}
          </div>
        </div>
      </div>

      <div className="controls">
        <div className="field-group" style={{ flex: 2, minWidth: 180, position: "relative" }}>
          <span className="field-label">Resort</span>
          {resort ? (
            <div className="resort-badge">
              <i className="ti ti-map-pin" style={{ fontSize: 12 }} />
              {resort.name}
              <span className="resort-badge-state">{resort.state}</span>
              <button className="resort-badge-remove" onClick={() => { setResort(null); setResult(null); }}>×</button>
            </div>
          ) : (
            <div className="dropdown-wrap">
              <input className="field-input" type="text" placeholder="Search resorts…" value={query}
                onChange={e => { setQuery(e.target.value); setShowDrop(true); }}
                onFocus={() => setShowDrop(true)}
                onBlur={() => setTimeout(() => setShowDrop(false), 160)} />
              {showDrop && filtered.length > 0 && (
                <div className="dropdown">
                  {filtered.map(r => (
                    <div key={r.name} className="dropdown-item" onMouseDown={() => pickResort(r)}>
                      <span>{r.name}</span>
                      <div className="dropdown-tags">
                        {r.unofficialAlpine && <span className="tag tag-ua">UA</span>}
                        {r.opensnow && <span className="tag tag-os">OS</span>}
                        <span className="tag tag-st">{r.state}</span>
                      </div>
                    </div>
                  ))}
                </div>
              )}
              {showDrop && query.length > 1 && filtered.length === 0 && (
                <div className="dropdown"><div className="dropdown-empty">No Ikon resorts matching "{query}"</div></div>
              )}
            </div>
          )}
        </div>

        <div className="field-group" style={{ flex: 2, minWidth: 150 }}>
          <span className="field-label">Driving from</span>
          <AddressAutocomplete
            value={origin}
            onChange={setOrigin}
            placeholder="Start typing your city or address…"
          />
        </div>

        <div className="field-group" style={{ flex: 1, minWidth: 130 }}>
          <span className="field-label">Date</span>
          <input className="field-input" type="date" value={date} onChange={e => setDate(e.target.value)} />
        </div>

        <button className="cta-btn" onClick={fetchBriefing} disabled={loading || !resort}>
          {loading
            ? <><i className="ti ti-loader-2 spin" style={{ fontSize: 14 }} />Loading…</>
            : <><i className="ti ti-refresh" style={{ fontSize: 14 }} />Get briefing</>}
        </button>
      </div>

      {resort && (
        <div className="quick-links">
          {resort.opensnow && <QuickLink href={`https://opensnow.com/dailysnow/${resort.opensnow}`} icon="ti-snowflake" label="OpenSnow daily forecast" variant="cyan" />}
          {resort.unofficialAlpine && <QuickLink href="https://unofficialalpine.com/" icon="ti-pencil" label="Unofficial Alpine" variant="green" />}
          {resort.parking && <QuickLink href="https://www.parkpalisadestahoe.com/mapnpark" icon="ti-parking" label="Map N Park" variant="cyan" />}
          {isTahoe && <QuickLink href="https://member.everbridge.net/453003085611269/login" icon="ti-shield-check" label="Placer County alerts" variant="orange" />}
          <QuickLink href={resort.url} icon="ti-mountain" label="Mountain report" variant="amber" />
        </div>
      )}

      {isTahoe && (
        <div className="tahoe-notice">
          <i className="ti ti-alert-triangle" style={{ fontSize: 14, flexShrink: 0, marginTop: 1 }} />
          <span>
            Tahoe resort — briefing includes Placer County Sheriff alerts, Caltrans I-80/SR-89 chain control, Reserve N Ski parking status, and Mountaineer wait estimate.
            For live push alerts, <a href="https://member.everbridge.net/453003085611269/login" target="_blank" rel="noopener noreferrer">log in to Everbridge ↗</a>
          </span>
        </div>
      )}

      {error && (
        <div className="error-bar">
          <i className="ti ti-alert-circle" style={{ fontSize: 14 }} />
          {error}. Make sure you're connected to the internet and try again.
        </div>
      )}

      {result && (
        <div className="result-header appear">
          <div className="result-pill">
            <i className="ti ti-check" style={{ fontSize: 11 }} />
            Live briefing · {resort && resort.name} · {dateLabel}
          </div>
        </div>
      )}

      {(loading || result) && (
        <div className="cards appear">
          {SECTIONS.map(s => (
            <SectionCard key={s} section={s} content={result && result[s]} loading={loading && !result} resort={resort} />
          ))}
        </div>
      )}

      {!loading && !result && !error && (
        <div className="empty">
          <i className="ti ti-mountain empty-icon" />
          <div className="empty-text">
            Search for an Ikon Pass resort above,<br />set your departure city and date, then hit Get Briefing.
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
